# 边缘盒子 — 一个 docker compose up 拉起全部
# agent server (:9100) 含前厅推理 + 后厨推理 + IPC 抓帧
version: "3.8"

services:
  edge:
    build: .
    container_name: hotpot-edge
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "9100:9100"
    volumes:
      - /opt/hotpot-infer/models:/opt/hotpot-infer/models:ro
      - /opt/hotpot-infer/data:/opt/hotpot-infer/data
      - /tmp/ipc_frames:/tmp/ipc_frames
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HOTPOT_MODE=agent
      - HOTPOT_HUB_URL=${HOTPOT_HUB_URL:-http://192.168.2.85:8098}
      - HOTPOT_STORE_ID=${HOTPOT_STORE_ID:-store_yuhuan}
    network_mode: host
