# 后厨边缘推理服务
# 部署：cd deploy/jetson && docker compose up -d
# 前置：模型已下载到 /opt/hotpot-infer/models/（build.sh 或手动）
version: "3.8"

services:
  kitchen:
    build:
      context: ../..                    # 项目根目录
      dockerfile: deploy/jetson/Dockerfile
    container_name: hotpot-kitchen
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "9200:9200"
    volumes:
      # 模型权重（大文件，不进镜像，板端本地缓存）
      - /opt/hotpot-infer/models:/models:ro
      # 推理数据
      - /opt/hotpot-infer/data:/data
      # llama-server 二进制（build.sh 产出）
      - /opt/hotpot-infer/bin:/opt/hotpot-infer/bin:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HOTPOT_HUB_URL=http://192.168.2.85:8098
      - HOTPOT_STORE_ID=store_yuhuan
      - HOTPOT_ZONE=kitchen
    networks:
      - hotpot-edge

networks:
  hotpot-edge:
    name: hotpot-edge
