# 冯校长火锅 · 端口分离（内网 / 无 DNS）
#   :3000  业务平台（拒绝 /admin/）
#   :3001  运营后台（/admin/ + /assets/）
#
# 防火墙示例：3001 仅允许总部网段 10.0.0.0/8

upstream hotpot_hub {
    server 127.0.0.1:8088;
    keepalive 8;
}

# —— :3000 / :80 业务平台 ——
server {
    listen 3000;
    listen 80;
    server_name _;

    root /mnt/project/hotpot_smart_ops/dashboard;
    index login.html;

    location /api/ {
        proxy_pass http://hotpot_hub/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        return 403;
    }

    location / {
        try_files $uri $uri/ /login.html;
    }
}

# —— :3001 运营后台 ——
server {
    listen 3001;
    server_name _;

    root /mnt/project/hotpot_smart_ops/dashboard;

    location /api/ {
        proxy_pass http://hotpot_hub/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location = / {
        return 302 /admin/index.html;
    }

    location /login.html {
        try_files $uri =404;
    }

    location ~ ^/(home|tables|kitchen|sop|cost|alerts|report|pda)\.html {
        return 403;
    }
}
