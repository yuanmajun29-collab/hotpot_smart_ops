# 冯校长火锅 · 子域分离（Phase 2 推荐）
#   ops.example.com     — 门店业务平台 + 层级看板（禁止 /admin/）
#   admin.example.com   — 运营后台（/admin/ + /assets/）
#
# 本地测试 /etc/hosts:
#   127.0.0.1 ops.hotpot.local admin.hotpot.local

upstream hotpot_hub {
    server 127.0.0.1:8088;
    keepalive 8;
}

# —— 业务平台 ——
server {
    listen 80;
    server_name ops.example.com ops.hotpot.local;

    root /mnt/project/hotpot_smart_ops/dashboard;
    index login.html;

    location /api/ {
        proxy_pass http://hotpot_hub/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 门店侧不可访问运营后台
    location /admin/ {
        return 403;
    }

    location / {
        try_files $uri $uri/ /login.html;
    }
}

# —— 运营后台 ——
server {
    listen 80;
    server_name admin.example.com admin.hotpot.local;

    root /mnt/project/hotpot_smart_ops/dashboard;
    index index.html;

    location /api/ {
        proxy_pass http://hotpot_hub/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 共享静态资源（admin 页面引用 ../assets/）
    location /assets/ {
        try_files $uri =404;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # 根路径跳转运营后台首页
    location = / {
        return 302 /admin/index.html;
    }

    location /login.html {
        return 302 https://ops.example.com/login.html?admin=1;
        # 本地 split-ports 已在 :3001 直接提供 login.html，勿重定向
    }

    # 禁止从 admin 域访问门店业务页
    location ~ ^/(home|tables|kitchen|sop|cost|alerts|report|pda|mobile)\.html {
        return 403;
    }
}
