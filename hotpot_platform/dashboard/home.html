<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页 · 冯校长火锅 · 智能运营</title>
  <link rel="stylesheet" href="assets/theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>冯校长火锅</h1><p>智能运营 · MVP</p></div>
      <a class="nav-item active" data-nav="home" href="home.html">首页概览</a>
      <a class="nav-item" data-nav="tables" href="tables.html">前厅 · 桌态</a>
      <a class="nav-item" data-nav="kitchen" href="kitchen.html">后厨 · IoT</a>
      <a class="nav-item" data-nav="sop" href="sop.html">SOP 执行</a>
      <a class="nav-item" data-nav="cost" href="cost.html">来料 · 成本</a>
      <a class="nav-item" data-nav="staff" href="staff-behavior.html">员工 · 行为</a>
      <a class="nav-item" data-nav="alerts" href="alerts.html">告警中心 <span class="nav-badge" id="nav-badge" style="display:none">0</span></a>
      <a class="nav-item" data-nav="report" href="report.html">运营日报</a>
      <a class="nav-item" data-nav="pda" href="pda/receiving.html">收货 PDA</a>
      <a class="nav-item" href="index.html">🏠 总控台</a>
    </aside>
    <div class="main-wrap">
      <header class="topbar">
        <div class="topbar-left">
          <h2 id="store-name">—</h2>
          <div class="topbar-meta">午市 · <span id="conn-status">检测中</span></div>
        </div>
        <div class="topbar-right">
          <input class="hub-input" id="hub-url" type="text" title="Event Hub URL" />
          <span class="chip" id="user-name">—</span>
          <button class="btn btn-sm btn-ghost" id="btn-logout">退出</button>
        </div>
      </header>
      <main class="content">
        <div class="mvp-banner">MVP 原型 · 数据来自 Event Hub 实时 API · 适用于试点店长概念测试</div>
        <div class="grid" id="kpi-grid">
          <div class="card"><h3>严重告警</h3><div class="stat critical" id="k-critical">-</div></div>
          <div class="card"><h3>待清台</h3><div class="stat warn" id="k-clean">-</div></div>
          <div class="card"><h3>SOP 合规率</h3><div class="stat ok" id="k-sop">-</div></div>
          <div class="card"><h3>损耗风险</h3><div class="stat warn" id="k-loss">-</div></div>
          <div class="card"><h3>空桌</h3><div class="stat ok" id="k-empty">-</div></div>
        </div>
        <div class="card card-mb">
          <h3>待处理</h3>
          <div id="todo-list"></div>
        </div>
        <h3 class="section-hint" style="text-transform:uppercase">快捷入口</h3>
        <div class="quick-grid">
          <a class="quick-link" href="tables.html"><span class="ql-ic"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M14 14h7v7h-7z"/><path d="M3 14h7v7H3z"/></svg></span>桌态翻台</a>
          <a class="quick-link" href="sop.html"><span class="ql-ic"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H7a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/><path d="M9 3h6v3H9z"/><path d="m9 14 2 2 4-4"/></svg></span>SOP</a>
          <a class="quick-link" href="cost.html"><span class="ql-ic"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M5 7h14"/><path d="m7 7-4 8h8z"/><path d="m17 7-4 8h8z"/><path d="M8 21h8"/></svg></span>损耗预测</a>
          <a class="quick-link" href="kitchen.html"><span class="ql-ic"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4.5V14a4 4 0 1 1-4 0V4.5a2 2 0 0 1 4 0Z"/></svg></span>IoT 链路</a>
          <a class="quick-link" href="alerts.html"><span class="ql-ic"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 6 3 8 3 8H3s3-2 3-8"/><path d="M10.5 21a1.8 1.8 0 0 0 3 0"/></svg></span>告警</a>
          <a class="quick-link" href="report.html"><span class="ql-ic"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h6"/></svg></span>日报</a>
        </div>
      </main>
    </div>
  </div>
  <script src="assets/core.js"></script>
  <script>
    HotpotApp.initShell("home");
    async function refresh() {
      try {
        const [data, events, loss] = await Promise.all([
          HotpotApp.fetchSummary(),
          HotpotApp.fetchEvents(20),
          HotpotApp.fetchLossRisk(3),
        ]);
        const t = data.table_state_counts || {};
        const ev = data.by_level || {};
        document.getElementById("k-critical").textContent = ev.critical ?? 0;
        document.getElementById("k-clean").textContent = t.need_clean ?? 0;
        document.getElementById("k-sop").textContent =
          data.sop_stats?.compliance_rate != null ? data.sop_stats.compliance_rate + "%" : "-";
        document.getElementById("k-loss").textContent =
          loss.estimated_loss_amount_total ? "¥" + loss.estimated_loss_amount_total.toLocaleString() : (loss.count || 0);
        document.getElementById("k-empty").textContent = t.empty ?? 0;

        const todo = document.getElementById("todo-list");
        todo.innerHTML = "";
        const items = [];
        (loss.risks || []).slice(0, 1).forEach((r) => {
          const amount = r.estimated_loss_amount ? ` ¥${r.estimated_loss_amount.toLocaleString()}` : "";
          items.push({ text: `损耗风险 ${r.sku || r.batch_id}${amount}：${r.reason}`, link: "cost.html", btn: "看建议" });
        });
        (data.turnover_suggestions || []).slice(0, 3).forEach((s) => {
          items.push({ text: `${s.table_id} 待清台 → ${s.action}`, link: "tables.html", btn: "去处理" });
        });
        if ((ev.critical || 0) > 0) items.push({ text: `${ev.critical} 条严重告警待确认`, link: "alerts.html", btn: "查看" });
        if (!items.length) items.push({ text: "当前无紧急待办，运营正常", link: null });
        items.forEach((it) => {
          const div = document.createElement("div");
          div.className = "todo-item";
          div.innerHTML = `<span>${HotpotApp.esc(it.text)}</span>` + (it.link ? `<a class="btn btn-sm" href="${it.link}">${HotpotApp.esc(it.btn)}</a>` : "");
          todo.appendChild(div);
        });

        const badge = document.getElementById("nav-badge");
        const n = HotpotApp.countUnackedCritical(events);
        if (n > 0) { badge.style.display = ""; badge.textContent = n; }
        else badge.style.display = "none";
      } catch (e) { console.warn(e); }
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
