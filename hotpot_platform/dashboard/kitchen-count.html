<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>废料计数看板 · 冯校长火锅</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #c9d1d9; --muted: #8b949e; --brand: #e2613a;
  --ok: #3fb950; --warn: #d2991d; --accent: #f85149;
  --blue: #58a6ff; --purple: #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, system-ui, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
.header {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: var(--card); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.header h1 { font-size: 1.15rem; }
.header .meta { font-size: 0.8rem; color: var(--muted); }
.badge { background: var(--brand); color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; }
.badge.live { background: var(--ok); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.content { padding: 24px; max-width: 1200px; margin: 0 auto; }
/* Big count card */
.hero { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
.hero-card {
  flex: 1; min-width: 200px; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; text-align: center;
}
.hero-card .label { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
.hero-card .value { font-size: 3rem; font-weight: 900; line-height: 1; }
.hero-card .value.accent { color: var(--accent); }
.hero-card .value.ok { color: var(--ok); }
.hero-card .value.brand { color: var(--brand); }
.hero-card .sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
/* Trend chart */
.chart-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 24px;
}
.chart-card h2 { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; }
.chart-row { display: flex; align-items: flex-end; gap: 12px; height: 160px; padding: 0 4px; flex-wrap: wrap; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 40px; }
.chart-bar {
  width: 100%; max-width: 60px; border-radius: 4px 4px 0 0;
  background: linear-gradient(to top, var(--brand), var(--accent));
  transition: height 0.5s ease; min-height: 4px;
}
.chart-bar.empty { background: rgba(255,255,255,0.05); }
.chart-val { font-size: 0.75rem; font-weight: 600; margin-top: 6px; }
.chart-label { font-size: 0.65rem; color: var(--muted); margin-top: 4px; }
/* SKU breakdown */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
@media(max-width:768px){ .grid-2 { grid-template-columns: 1fr; } }
.sku-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
}
.sku-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }
.sku-row {
  display: flex; align-items: center; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.sku-row:last-child { border-bottom: none; }
.sku-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
.sku-bar-fill { height: 100%; border-radius: 4px; background: var(--brand); transition: width 0.5s ease; }
.sku-name { width: 60px; font-size: 0.85rem; }
.sku-count { width: 40px; text-align: right; font-size: 0.85rem; font-weight: 600; color: var(--brand); }
/* Event log */
.log-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
}
.log-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; }
.log-list { max-height: 300px; overflow-y: auto; font-size: 0.82rem; }
.log-row {
  display: flex; gap: 12px; padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  align-items: center;
}
.log-time { color: var(--muted); font-size: 0.72rem; width: 70px; flex: none; }
.log-count { color: var(--brand); font-weight: 700; width: 40px; text-align: right; flex: none; }
.log-items { flex: 1; color: var(--text); }
.empty { text-align: center; padding: 40px; color: var(--muted); }
.empty .icon { font-size: 3rem; margin-bottom: 12px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--muted); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>🗑️ 废料计数看板 · 冯校长火锅</h1>
    <div class="meta">Jetson Count API :8100 → Pipeline → Hub :8098 → Dashboard :3000</div>
  </div>
  <div>
    <span id="conn-badge" class="badge">⏳ 连接中...</span>
    <span id="live-badge" class="badge live" style="margin-left:8px;display:none">● LIVE</span>
  </div>
</div>

<div class="content">
  <!-- Hero cards -->
  <div class="hero">
    <div class="hero-card">
      <div class="label">📦 今日废料总数</div>
      <div class="value brand" id="hero-total">--</div>
      <div class="sub">store_yuhuan · 备餐废弃区</div>
    </div>
    <div class="hero-card">
      <div class="label">📊 7日均值</div>
      <div class="value ok" id="hero-avg">--</div>
      <div class="sub">日均废料件数</div>
    </div>
    <div class="hero-card">
      <div class="label">📈 今日事件数</div>
      <div class="value" id="hero-events">--</div>
      <div class="sub">推理上报次数</div>
    </div>
    <div class="hero-card">
      <div class="label">🔴 峰值日</div>
      <div class="value accent" id="hero-peak">--</div>
      <div class="sub" id="hero-peak-date">--</div>
    </div>
  </div>

  <!-- Trend chart -->
  <div class="chart-card">
    <h2>📈 7日废料趋势 (count per day)</h2>
    <div class="chart-row" id="chart">
      <div class="empty" style="width:100%"><span class="spinner"></span> 加载中...</div>
    </div>
  </div>

  <div class="grid-2">
    <!-- SKU breakdown -->
    <div class="sku-card">
      <h3>🏷️ 废料品类分布</h3>
      <div id="sku-list"><div class="empty"><div class="icon">📦</div>暂无数据</div></div>
    </div>
    <!-- Recent events log -->
    <div class="log-card">
      <h3>📋 最近上报事件</h3>
      <div class="log-list" id="event-log"><div class="empty"><div class="icon">📝</div>暂无事件</div></div>
    </div>
  </div>
</div>

<script>
const HUB = window.location.origin.replace(':3000', ':8098') || 'http://localhost:8098';
const STORE = 'store_yuhuan';
const DAYS = 7;
const REFRESH_MS = 30000;

let loading = false;

async function fetchStats() {
  if (loading) return;
  loading = true;
  try {
    const resp = await fetch(`${HUB}/api/kitchen/waste/stats?store_id=${STORE}&days=${DAYS}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    document.getElementById('conn-badge').textContent = '✅ Hub 在线';
    document.getElementById('conn-badge').className = 'badge';
    document.getElementById('live-badge').style.display = 'inline-block';

    renderHero(data);
    renderChart(data);
    renderSkuBreakdown(data);
    renderEventLog(data);
  } catch (e) {
    document.getElementById('conn-badge').textContent = '❌ Hub 离线';
    document.getElementById('conn-badge').className = 'badge';
    document.getElementById('live-badge').style.display = 'none';
    console.warn('fetchStats error:', e);
  }
  loading = false;
}

function renderHero(data) {
  const daily = data.daily || [];
  const trend = data.trend || [];
  const today = daily.length > 0 ? daily[daily.length - 1] : null;

  document.getElementById('hero-total').textContent = today ? today.total_count : '--';
  document.getElementById('hero-events').textContent = today ? today.event_count : '--';

  const nonZero = trend.filter(v => v > 0);
  const avg = nonZero.length > 0 ? Math.round(nonZero.reduce((a,b)=>a+b,0) / nonZero.length) : 0;
  document.getElementById('hero-avg').textContent = avg;

  const maxVal = trend.length > 0 ? Math.max(...trend) : 0;
  const maxIdx = trend.indexOf(maxVal);
  document.getElementById('hero-peak').textContent = maxVal || '--';
  document.getElementById('hero-peak-date').textContent = maxVal ? (data.dates?.[maxIdx] || '--') : '--';
}

function renderChart(data) {
  const chart = document.getElementById('chart');
  const trend = data.trend || [];
  const dates = data.dates || [];
  const maxVal = Math.max(1, ...trend);

  if (dates.length === 0) {
    chart.innerHTML = '<div class="empty" style="width:100%"><div class="icon">📊</div>暂无趋势数据</div>';
    return;
  }

  chart.innerHTML = dates.map((date, i) => {
    const val = trend[i] || 0;
    const h = Math.max(4, Math.round((val / maxVal) * 140));
    const cls = val === 0 ? ' empty' : '';
    const shortDate = date.slice(5); // MM-DD
    return `<div class="chart-bar-wrap">
      <div class="chart-bar${cls}" style="height:${h}px"></div>
      <div class="chart-val">${val}</div>
      <div class="chart-label">${shortDate}</div>
    </div>`;
  }).join('');
}

function renderSkuBreakdown(data) {
  const container = document.getElementById('sku-list');
  const daily = data.daily || [];

  // Aggregate SKU counts across all days
  const skuMap = {};
  for (const day of daily) {
    for (const item of (day.items || [])) {
      const sku = item.sku || 'unknown';
      skuMap[sku] = (skuMap[sku] || 0) + item.count;
    }
  }

  const entries = Object.entries(skuMap).sort((a, b) => b[1] - a[1]);
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📦</div>暂无数据</div>';
    return;
  }

  const maxCount = entries[0][1];
  container.innerHTML = entries.slice(0, 8).map(([sku, count]) => {
    const pct = Math.round((count / maxCount) * 100);
    return `<div class="sku-row">
      <span class="sku-name">${sku}</span>
      <div class="sku-bar-bg"><div class="sku-bar-fill" style="width:${pct}%"></div></div>
      <span class="sku-count">${count}</span>
    </div>`;
  }).join('');
}

function renderEventLog(data) {
  const container = document.getElementById('event-log');
  const daily = data.daily || [];

  if (daily.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📝</div>暂无事件</div>';
    return;
  }

  // Show recent days with events
  const withEvents = daily.filter(d => d.event_count > 0).reverse();
  if (withEvents.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📝</div>暂无事件</div>';
    return;
  }

  container.innerHTML = withEvents.slice(0, 20).map(day => {
    const topItems = (day.items || []).slice(0, 3).map(i => `${i.sku}×${i.count}`).join(', ');
    return `<div class="log-row">
      <span class="log-time">${day.date}</span>
      <span class="log-count">${day.total_count}</span>
      <span class="log-items">${topItems || '—'} · ${day.event_count}次推理</span>
    </div>`;
  }).join('');
}

// Initial load + periodic refresh
fetchStats();
setInterval(fetchStats, REFRESH_MS);
</script>
</body>
</html>
