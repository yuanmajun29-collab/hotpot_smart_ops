<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老板一页式驾驶舱 · 冯校长火锅</title>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #14110e;
      --panel: #211a15;
      --panel-2: #2a211b;
      --line: #423329;
      --text: #f7eee4;
      --muted: #bba99a;
      --brand: #e35f34;
      --gold: #e4b450;
      --green: #58bd87;
      --red: #f25d52;
      --blue: #82bad6;
      --shadow: rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 0%, rgba(227, 95, 52, 0.18), transparent 28%),
        linear-gradient(180deg, #1d1611 0%, var(--bg) 44%);
      color: var(--text);
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    .page {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .hero {
      padding: 18px 2px 14px;
    }

    .eyebrow {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    h1 {
      margin: 8px 0 8px;
      font-size: 28px;
      line-height: 1.14;
      font-weight: 800;
    }

    .summary {
      min-height: 40px;
      color: #e7d8c8;
      font-size: 13px;
      line-height: 1.55;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(33, 26, 21, 0.78);
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px currentColor;
    }

    .dot.warn { background: var(--gold); }
    .dot.bad { background: var(--red); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(33, 26, 21, 0.92);
      box-shadow: 0 10px 28px var(--shadow);
    }

    .metric {
      min-height: 116px;
      padding: 13px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      inset: auto -22px -40px auto;
      width: 96px;
      height: 96px;
      border: 1px solid rgba(227, 95, 52, 0.18);
      transform: rotate(25deg);
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .value {
      margin-top: 10px;
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .unit {
      margin-left: 3px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .delta {
      margin-top: 11px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .delta.good { color: var(--green); }
    .delta.warn { color: var(--gold); }
    .delta.bad { color: var(--red); }

    .section {
      margin-top: 12px;
      padding: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
    }

    .source {
      flex: none;
      color: var(--muted);
      font-size: 11px;
    }

    .chart-box {
      height: 210px;
      position: relative;
    }

    .alerts {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .alert-item {
      display: grid;
      grid-template-columns: 10px 1fr auto;
      gap: 9px;
      align-items: start;
      padding: 10px 0;
      border-top: 1px solid rgba(66, 51, 41, 0.72);
      font-size: 12px;
      line-height: 1.45;
    }

    .alert-item:first-child { border-top: 0; padding-top: 0; }

    .severity {
      width: 9px;
      height: 9px;
      margin-top: 5px;
      border-radius: 50%;
      background: var(--gold);
    }

    .severity.critical { background: var(--red); }
    .severity.info { background: var(--blue); }

    .alert-title {
      color: var(--text);
      font-weight: 700;
    }

    .alert-meta {
      color: var(--muted);
      margin-top: 2px;
    }

    .time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .store-row {
      display: grid;
      grid-template-columns: 78px 1fr 42px;
      align-items: center;
      gap: 9px;
      padding: 9px 0;
      border-top: 1px solid rgba(66, 51, 41, 0.72);
      font-size: 12px;
    }

    .store-row:first-child { border-top: 0; padding-top: 0; }

    .store-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #15110e;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--gold), var(--green));
    }

    .score {
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .roi {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .roi-main {
      padding: 14px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(227, 95, 52, 0.16), rgba(88, 189, 135, 0.12));
      border: 1px solid rgba(227, 95, 52, 0.26);
    }

    .roi-value {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .roi-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .roi-box {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .roi-box b {
      display: block;
      margin-top: 6px;
      font-size: 18px;
      font-variant-numeric: tabular-nums;
    }

    .footnote {
      margin-top: 12px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.55;
    }

    .empty {
      padding: 18px 0;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    @media (min-width: 521px) {
      body { background-color: #0e0d0c; }
      .page { border-left: 1px solid rgba(66, 51, 41, 0.5); border-right: 1px solid rgba(66, 51, 41, 0.5); }
    }

    @media (max-width: 360px) {
      .page { padding-left: 10px; padding-right: 10px; }
      h1 { font-size: 24px; }
      .value { font-size: 24px; }
      .metric { padding: 11px; }
      .store-row { grid-template-columns: 66px 1fr 36px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">
        <span>冯校长火锅 · CEO Cockpit</span>
        <span id="today">—</span>
      </div>
      <h1>老板一页式驾驶舱</h1>
      <div class="summary" id="summary">正在加载集团经营态势…</div>
      <div class="status-row">
        <span class="pill"><span class="dot" id="status-dot"></span><span id="status-text">初始化中</span></span>
        <span class="pill">30 秒自动刷新</span>
      </div>
    </section>

    <section class="grid" aria-label="核心指标">
      <article class="card metric">
        <div class="label">本月预警数</div>
        <div class="value"><span id="kpi-alerts">—</span><span class="unit">条</span></div>
        <div class="delta" id="kpi-alerts-sub">最近告警同步中</div>
      </article>
      <article class="card metric">
        <div class="label">安全分</div>
        <div class="value"><span id="kpi-safety">—</span><span class="unit">分</span></div>
        <div class="delta" id="kpi-safety-sub">跨店健康均值</div>
      </article>
      <article class="card metric">
        <div class="label">翻台率</div>
        <div class="value"><span id="kpi-turnover">—</span><span class="unit">次/桌</span></div>
        <div class="delta" id="kpi-turnover-sub">本月经营效率</div>
      </article>
      <article class="card metric">
        <div class="label">损耗预算</div>
        <div class="value"><span id="kpi-loss">—</span><span class="unit">%</span></div>
        <div class="delta" id="kpi-loss-sub">成本偏差率</div>
      </article>
    </section>

    <section class="card section">
      <div class="section-head">
        <h2>翻台趋势</h2>
        <span class="source" id="trend-source">占位趋势</span>
      </div>
      <div class="chart-box"><canvas id="turnover-chart"></canvas></div>
    </section>

    <section class="card section">
      <div class="section-head">
        <h2>实时告警 · 最近 10 条</h2>
        <span class="source" id="alert-source">加载中</span>
      </div>
      <div class="alerts" id="alerts-list"><div class="empty">暂无告警</div></div>
    </section>

    <section class="card section">
      <div class="section-head">
        <h2>跨店健康分对比</h2>
        <span class="source" id="health-source">加载中</span>
      </div>
      <div id="health-list"><div class="empty">暂无门店数据</div></div>
    </section>

    <section class="card section">
      <div class="section-head">
        <h2>本月 ROI</h2>
        <span class="source">避免损失 + 翻台增收</span>
      </div>
      <div class="roi">
        <div class="roi-main">
          <div class="label">预计已创造经营收益</div>
          <div class="roi-value" id="roi-total">—</div>
          <div class="footnote" id="roi-note">基于当前预警、损耗与翻台率做前端估算。</div>
        </div>
        <div class="roi-detail">
          <div class="roi-box">
            <div class="label">避免损失</div>
            <b id="roi-save">—</b>
          </div>
          <div class="roi-box">
            <div class="label">翻台增收</div>
            <b id="roi-growth">—</b>
          </div>
        </div>
      </div>
    </section>

    <div class="footnote" id="refresh-note">最后刷新：—</div>
  </main>

  <script>
    const FALLBACK = {
      national: {
        region_name: "全国总部",
        narrative: ["初始化占位：Hub 暂不可用时展示默认经营态势"],
        rollup: {
          store_count: 4,
          total_critical_alerts: 3,
          avg_sop_compliance: 92,
        },
        stores: [
          { store_id: "store_yuhuan", store_name: "冯校长火锅·玉环店", metrics: { turnover_rate: 3.8, cost_variance_pct: 2.6, daily_revenue: 58600, critical_alerts: 0 }, health: { score: 92, status: "ok" } },
          { store_id: "store_jiaojiang", store_name: "冯校长火锅·椒江店", metrics: { turnover_rate: 3.4, cost_variance_pct: 3.1, daily_revenue: 53100, critical_alerts: 1 }, health: { score: 84, status: "warn" } },
          { store_id: "store_luqiao", store_name: "冯校长火锅·路桥店", metrics: { turnover_rate: 3.1, cost_variance_pct: 4.2, daily_revenue: 49200, critical_alerts: 2 }, health: { score: 76, status: "warn" } },
          { store_id: "store_wenling", store_name: "冯校长火锅·温岭店", metrics: { turnover_rate: 4.1, cost_variance_pct: 2.2, daily_revenue: 64100, critical_alerts: 0 }, health: { score: 94, status: "ok" } },
        ],
        anomaly_stores: [
          { store_id: "store_luqiao", store_name: "冯校长火锅·路桥店", health: "warn", reasons: ["损耗预算偏高"] },
          { store_id: "store_jiaojiang", store_name: "冯校长火锅·椒江店", health: "warn", reasons: ["冷链告警待复核"] },
        ],
      },
      events: [
        { level: "critical", source: "iot", event_type: "cold_chain_risk", store_id: "store_jiaojiang", message: "冷柜温度连续超阈值", timestamp: new Date(Date.now() - 9 * 60 * 1000).toISOString() },
        { level: "warn", source: "cost", event_type: "loss_budget", store_id: "store_luqiao", message: "毛肚损耗预算超线", timestamp: new Date(Date.now() - 18 * 60 * 1000).toISOString() },
        { level: "info", source: "front_hall", event_type: "turnover", store_id: "store_yuhuan", message: "晚市翻台效率高于均值", timestamp: new Date(Date.now() - 31 * 60 * 1000).toISOString() },
      ],
    };

    const state = {
      chart: null,
      lastOk: false,
      failures: [],
    };

    function hubUrl() {
      const fromConfig = window.HOTPOT_CONFIG && window.HOTPOT_CONFIG.hubUrl;
      const saved = localStorage.getItem("hotpot_hub_url");
      return String(saved || fromConfig || "http://127.0.0.1:8098").replace(/\/$/, "");
    }

    function authHeaders() {
      try {
        const raw = sessionStorage.getItem("hotpot_auth");
        const auth = raw ? JSON.parse(raw) : null;
        return auth && auth.token ? { Authorization: `Bearer ${auth.token}` } : {};
      } catch {
        return {};
      }
    }

    async function api(path) {
      const res = await fetch(`${hubUrl()}${path}`, { headers: authHeaders() });
      if (!res.ok) throw new Error(`${path} ${res.status}`);
      return res.json();
    }

    function settle(results, index, fallback) {
      if (results[index] && results[index].status === "fulfilled") return { data: results[index].value, ok: true };
      return { data: fallback, ok: false };
    }

    function fmtMoney(v) {
      const n = Number(v || 0);
      if (n >= 10000) return `¥${(n / 10000).toFixed(1)}万`;
      return `¥${Math.round(n).toLocaleString("zh-CN")}`;
    }

    function fmtTime(ts) {
      const d = ts ? new Date(ts) : new Date();
      if (Number.isNaN(d.getTime())) return "刚刚";
      return d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
    }

    function shortName(name, id) {
      return String(name || id || "门店").replace("冯校长火锅·", "");
    }

    function avg(values) {
      const nums = values.map(Number).filter((v) => Number.isFinite(v));
      return nums.length ? nums.reduce((s, v) => s + v, 0) / nums.length : null;
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function updateStatus(ok, failures) {
      const dot = document.getElementById("status-dot");
      dot.className = "dot";
      if (!ok) dot.classList.add("bad");
      if (ok && failures.length) dot.classList.add("warn");
      setText("status-text", ok ? (failures.length ? "部分接口占位" : "实时在线") : "离线占位");
      setText("refresh-note", `最后刷新：${new Date().toLocaleString("zh-CN")}${failures.length ? ` · 失败 ${failures.length} 项` : ""}`);
    }

    function sourceText(ok) {
      return ok ? "实时数据" : "默认占位";
    }

    function deriveTrend(stores) {
      const base = avg(stores.map((s) => s.metrics && s.metrics.turnover_rate)) || 3.5;
      const labels = [];
      const values = [];
      for (let i = 11; i >= 0; i -= 1) {
        const d = new Date();
        d.setDate(d.getDate() - i * 2);
        labels.push(`${d.getMonth() + 1}/${d.getDate()}`);
        const wave = Math.sin((11 - i) / 1.8) * 0.22 + Math.cos((11 - i) / 3) * 0.12;
        values.push(Number(clamp(base + wave, 1.8, 5.6).toFixed(2)));
      }
      return { labels, values };
    }

    function renderChart(stores, ok) {
      const ctx = document.getElementById("turnover-chart");
      const trend = deriveTrend(stores);
      if (state.chart) state.chart.destroy();
      state.chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: trend.labels,
          datasets: [{
            label: "翻台率",
            data: trend.values,
            borderColor: "#e35f34",
            backgroundColor: "rgba(227, 95, 52, 0.18)",
            fill: true,
            tension: 0.36,
            pointRadius: 2,
            pointHoverRadius: 4,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { displayColors: false } },
          scales: {
            x: { ticks: { color: "#bba99a", maxRotation: 0, autoSkip: true }, grid: { display: false } },
            y: { ticks: { color: "#bba99a" }, grid: { color: "rgba(66, 51, 41, 0.7)" }, suggestedMin: 2, suggestedMax: 5 },
          },
        },
      });
      setText("trend-source", ok ? "按当前门店数据推演" : "占位趋势");
    }

    function normalizeEvents(events, stores, anomalies) {
      const storeMap = new Map(stores.map((s) => [s.store_id, s.store_name]));
      const fromEvents = Array.isArray(events) ? events : [];
      const normalized = fromEvents.map((e) => ({
        level: e.level || e.severity || "info",
        store: shortName(e.store_name || storeMap.get(e.store_id), e.store_id),
        title: e.message || e.title || e.event_type || e.source || "运营告警",
        meta: e.source || e.event_type || "event",
        time: e.timestamp || e.created_at || e.ts,
      }));
      const fromAnomaly = (anomalies || []).map((a) => ({
        level: a.health === "critical" ? "critical" : "warn",
        store: shortName(a.store_name, a.store_id),
        title: Array.isArray(a.reasons) ? a.reasons[0] : (a.reasons || "门店健康分波动"),
        meta: "health",
        time: new Date().toISOString(),
      }));
      return [...normalized, ...fromAnomaly].slice(0, 10);
    }

    function renderAlerts(items, ok) {
      const el = document.getElementById("alerts-list");
      if (!items.length) {
        el.innerHTML = '<div class="empty">最近暂无实时告警</div>';
      } else {
        el.innerHTML = items.map((a) => `
          <div class="alert-item">
            <span class="severity ${a.level === "critical" ? "critical" : a.level === "info" ? "info" : ""}"></span>
            <div>
              <div class="alert-title">${a.store} · ${a.title}</div>
              <div class="alert-meta">${a.meta}</div>
            </div>
            <span class="time">${fmtTime(a.time)}</span>
          </div>
        `).join("");
      }
      setText("alert-source", sourceText(ok));
    }

    function renderHealth(stores, ok) {
      const ranked = [...stores]
        .sort((a, b) => Number((b.health || {}).score || 0) - Number((a.health || {}).score || 0))
        .slice(0, 8);
      const el = document.getElementById("health-list");
      if (!ranked.length) {
        el.innerHTML = '<div class="empty">暂无门店健康分</div>';
      } else {
        el.innerHTML = ranked.map((s) => {
          const score = clamp(Number((s.health || {}).score || 0), 0, 100);
          return `
            <div class="store-row">
              <div class="store-name">${shortName(s.store_name, s.store_id)}</div>
              <div class="bar"><span style="width:${score}%"></span></div>
              <div class="score">${Math.round(score)}</div>
            </div>
          `;
        }).join("");
      }
      setText("health-source", sourceText(ok));
    }

    function renderKpis(national, events) {
      const stores = national.stores || [];
      const rollup = national.rollup || {};
      const monthWarnings = Math.max(
        Number(rollup.total_critical_alerts || 0) + Number((events || []).length || 0),
        stores.reduce((sum, s) => sum + Number((s.metrics || {}).critical_alerts || 0), 0)
      );
      const safety = avg(stores.map((s) => (s.health || {}).score)) ?? (rollup.avg_sop_compliance || 0);
      const turnover = avg(stores.map((s) => (s.metrics || {}).turnover_rate)) || 0;
      const loss = avg(stores.map((s) => (s.metrics || {}).cost_variance_pct)) || 0;
      const totalRevenue = stores.reduce((sum, s) => sum + Number((s.metrics || {}).daily_revenue || 0), 0);

      setText("kpi-alerts", Math.round(monthWarnings));
      setText("kpi-alerts-sub", `${stores.length || rollup.store_count || 0} 店 · 最近 10 条同步`);
      setText("kpi-safety", Math.round(safety || 0));
      document.getElementById("kpi-safety-sub").className = `delta ${safety >= 88 ? "good" : safety >= 78 ? "warn" : "bad"}`;
      setText("kpi-safety-sub", safety >= 88 ? "整体安全" : safety >= 78 ? "需区域复核" : "需立即关注");
      setText("kpi-turnover", turnover ? turnover.toFixed(1) : "—");
      setText("kpi-turnover-sub", `${fmtMoney(totalRevenue)} 日营收基准`);
      setText("kpi-loss", loss ? loss.toFixed(1) : "—");
      document.getElementById("kpi-loss-sub").className = `delta ${loss <= 3 ? "good" : loss <= 5 ? "warn" : "bad"}`;
      setText("kpi-loss-sub", loss <= 3 ? "预算内" : loss <= 5 ? "接近红线" : "超预算");

      const avoidedLoss = Math.round(monthWarnings * 3200 + Math.max(0, 4 - loss) * totalRevenue * 0.22);
      const turnoverGrowth = Math.round(Math.max(0, turnover - 3) * stores.length * 18500);
      setText("roi-total", fmtMoney(avoidedLoss + turnoverGrowth));
      setText("roi-save", fmtMoney(avoidedLoss));
      setText("roi-growth", fmtMoney(turnoverGrowth));
      setText("roi-note", `以 ${stores.length || rollup.store_count || 0} 店、当前预警闭环和翻台率做月度估算。`);

      const narrative = Array.isArray(national.narrative) ? national.narrative.join(" · ") : "";
      setText("summary", narrative || `${national.region_name || "全国总部"}经营态势已加载。`);
    }

    async function refresh() {
      const results = await Promise.allSettled([
        api("/v1/national/overview"),
        api("/v1/events?limit=10&store_id=store_yuhuan"),
      ]);
      const national = settle(results, 0, FALLBACK.national);
      const events = settle(results, 1, FALLBACK.events);
      const data = national.data || FALLBACK.national;
      const stores = data.stores || FALLBACK.national.stores;
      const eventItems = normalizeEvents(events.data, stores, data.anomaly_stores);
      const failures = results.map((r, i) => r.status === "rejected" ? i : null).filter((v) => v !== null);
      const anyOk = results.some((r) => r.status === "fulfilled");

      renderKpis({ ...data, stores }, eventItems);
      renderChart(stores, national.ok);
      renderAlerts(eventItems, events.ok || national.ok);
      renderHealth(stores, national.ok);
      updateStatus(anyOk, failures);
    }

    function init() {
      setText("today", new Date().toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit", weekday: "short" }));
      refresh().catch(() => {
        const stores = FALLBACK.national.stores;
        const eventItems = normalizeEvents(FALLBACK.events, stores, FALLBACK.national.anomaly_stores);
        renderKpis(FALLBACK.national, eventItems);
        renderChart(stores, false);
        renderAlerts(eventItems, false);
        renderHealth(stores, false);
        updateStatus(false, [0, 1]);
      });
      window.setInterval(refresh, 30000);
    }

    init();
  </script>
</body>
</html>
