<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>废料日报 · 冯校长火锅 · 智能运营</title>
  <link rel="stylesheet" href="assets/theme.css" />
  <style>
    /* Hero cards (extend theme vars) */
    .hero { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .hero-card {
      flex: 1; min-width: 160px; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 16px; text-align: center;
    }
    .hero-card .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
    .hero-card .value { font-size: 2rem; font-weight: 900; line-height: 1.2; }
    .hero-card .value.brand { color: var(--brand); }
    .hero-card .value.ok { color: var(--ok); }
    .hero-card .value.warn { color: var(--warn); }
    .hero-card .value.accent { color: var(--accent); }
    .hero-card .sub { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
    .hero-card .change { font-size: 0.8rem; margin-top: 4px; font-weight: 600; }
    .hero-card .change.up { color: var(--accent); }
    .hero-card .change.down { color: var(--ok); }
    .hero-card .change.flat { color: var(--muted); }

    /* Alert bar */
    .alert-bar {
      background: linear-gradient(135deg, #3d1111, #1f1813); border: 1px solid var(--accent);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
      display: none; align-items: center; gap: 12px; font-size: 0.85rem;
    }
    .alert-bar .alert-icon { font-size: 1.3rem; flex: none; }
    .alert-bar .alert-msg { flex: 1; }
    .alert-bar .alert-time { color: var(--muted); font-size: 0.72rem; flex: none; }

    /* Chart */
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; margin-bottom: 20px;
    }
    .chart-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .chart-svg-wrap { overflow-x: auto; }
    .chart-svg-wrap svg { width: 100%; min-width: 700px; }
    .chart-legend { display: flex; gap: 16px; font-size: 0.72rem; color: var(--muted); }
    .chart-legend span::before { content: '● '; font-size: 0.9rem; }
    .chart-legend .line-count::before { color: var(--brand); }
    .chart-legend .line-7d::before { color: var(--warn); }
    .chart-legend .line-30d::before { color: var(--blue); }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media(max-width:768px){ .grid-2 { grid-template-columns: 1fr; } }

    .sku-card, .log-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .sku-card h3, .log-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 14px; }
    .sku-row {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .sku-row:last-child { border-bottom: none; }
    .sku-name { width: 55px; font-size: 0.82rem; flex: none; }
    .sku-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
    .sku-bar-fill { height: 100%; border-radius: 4px; background: var(--brand); transition: width 0.5s ease; }
    .sku-count { width: 35px; text-align: right; font-size: 0.82rem; font-weight: 600; color: var(--brand); flex: none; }
    .sku-pct { width: 45px; text-align: right; font-size: 0.72rem; color: var(--muted); flex: none; }

    .alert-list-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border); font-size: 0.82rem;
    }
    .alert-list-item:last-child { border-bottom: none; }
    .alert-list-item .al-date { color: var(--muted); font-size: 0.72rem; width: 80px; flex: none; }
    .alert-list-item .al-msg { flex: 1; }
    .alert-list-item .al-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; flex: none; }
    .al-badge.ack { background: rgba(255,255,255,0.06); color: var(--muted); }
    .al-badge.unack { background: rgba(240, 71, 60, 0.2); color: var(--accent); font-weight: 600; }

    .empty-state { text-align: center; padding: 40px; color: var(--muted); }
    .empty-state .es-ic { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    /* Date picker */
    .date-nav { display: flex; align-items: center; gap: 8px; }
    .date-nav input[type=date] {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 4px 10px; border-radius: 8px; font-size: 0.82rem;
    }
    .date-nav .btn-sm { padding: 4px 12px; font-size: 0.75rem; }
    .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--ok); margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>冯校长火锅</h1><p>智能运营 · MVP</p></div>
      <a class="nav-item" data-nav="home" href="home.html">首页概览</a>
      <a class="nav-item" data-nav="tables" href="tables.html">前厅 · 桌态</a>
      <a class="nav-item" data-nav="kitchen" href="kitchen.html">后厨 · IoT</a>
      <a class="nav-item" data-nav="sop" href="sop.html">SOP 执行</a>
      <a class="nav-item" data-nav="cost" href="cost.html">来料 · 成本</a>
      <a class="nav-item" data-nav="alerts" href="alerts.html">告警中心</a>
      <a class="nav-item active" data-nav="daily-report" href="daily-report.html">废料日报</a>
      <a class="nav-item" data-nav="report" href="report.html">运营日报</a>
      <a class="nav-item" data-nav="pda" href="pda/receiving.html">收货 PDA</a>
    </aside>
    <div class="main-wrap">
      <header class="topbar">
        <div class="topbar-left">
          <h2>废料日报</h2>
          <div class="topbar-meta">
            <span class="live-dot" id="live-dot" style="display:none"></span>
            <span id="update-time">—</span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="date-nav">
            <button class="btn btn-sm btn-ghost" id="btn-prev" title="前一天">◀</button>
            <input type="date" id="date-picker" />
            <button class="btn btn-sm btn-ghost" id="btn-next" title="后一天">▶</button>
            <button class="btn btn-sm" id="btn-today">今天</button>
          </div>
          <select class="hub-input" id="store-select" style="width:auto;margin-left:8px">
            <option value="store_yuhuan">玉环店</option>
            <option value="store_jiaojiang">椒江店</option>
          </select>
          <span class="chip" id="user-name">—</span>
          <button class="btn btn-sm btn-ghost" id="btn-logout">退出</button>
        </div>
      </header>
      <main class="content">
        <!-- Alert summary -->
        <div class="alert-bar" id="alert-summary">
          <span class="alert-icon">🚨</span>
          <span class="alert-msg" id="alert-summary-msg"></span>
          <span class="alert-time" id="alert-summary-time"></span>
        </div>

        <!-- Hero cards -->
        <div class="hero">
          <div class="hero-card">
            <div class="label">📦 今日废料总数</div>
            <div class="value brand" id="hero-total">--</div>
            <div class="sub">事件数: <span id="hero-events">--</span></div>
          </div>
          <div class="hero-card">
            <div class="label">📊 7日均值</div>
            <div class="value ok" id="hero-avg7">--</div>
            <div class="sub">非零日移动均值</div>
          </div>
          <div class="hero-card">
            <div class="label">📈 日环比 (vs 昨日)</div>
            <div class="value" id="hero-dod-val" style="font-size:1.5rem">--</div>
            <div class="change flat" id="hero-dod-pct">--</div>
          </div>
          <div class="hero-card">
            <div class="label">📉 周环比 (7d vs 前7d)</div>
            <div class="value" id="hero-wow-val" style="font-size:1.5rem">--</div>
            <div class="change flat" id="hero-wow-pct">--</div>
          </div>
          <div class="hero-card">
            <div class="label">🔴 30日均值</div>
            <div class="value warn" id="hero-avg30">--</div>
            <div class="sub">长期趋势基线</div>
          </div>
        </div>

        <!-- Trend chart -->
        <div class="chart-card">
          <h3>
            <span>📈 30日废料趋势</span>
            <span class="chart-legend">
              <span class="line-count">废料计数</span>
              <span class="line-7d">7日均线</span>
              <span class="line-30d">30日均线</span>
            </span>
          </h3>
          <div class="chart-svg-wrap" id="chart">
            <div class="empty-state"><span class="es-ic">📊</span>加载中...</div>
          </div>
        </div>

        <div class="grid-2">
          <!-- TOP5 SKU -->
          <div class="sku-card">
            <h3>🏷️ TOP5 废料 SKU</h3>
            <div id="sku-list"><div class="empty-state"><span class="es-ic">📦</span>暂无数据</div></div>
          </div>
          <!-- Alerts list -->
          <div class="log-card">
            <h3>🚨 异常告警</h3>
            <div id="alert-list"><div class="empty-state"><span class="es-ic">✅</span>暂无告警</div></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="assets/core.js"></script>
  <script>
    HotpotApp.initShell("daily-report");
    const REFRESH_MS = 300000; // 5 min

    let currentDate = new Date().toISOString().slice(0, 10);
    let currentStore = "store_yuhuan";

    // ── Helpers ──
    function apiUrl() {
      const hub = localStorage.getItem("hotpot_hub_url") || window.location.origin.replace(":3000", ":8098");
      return `${hub}/api/daily-report?store_id=${currentStore}&date=${currentDate}`;
    }

    function formatDate(d) { return d.toISOString().slice(0, 10); }

    // ── Date navigation ──
    const picker = document.getElementById("date-picker");
    picker.value = currentDate;

    document.getElementById("btn-today").onclick = () => {
      currentDate = formatDate(new Date());
      picker.value = currentDate;
      loadReport();
    };
    document.getElementById("btn-prev").onclick = () => {
      const d = new Date(currentDate + "T12:00:00");
      d.setDate(d.getDate() - 1);
      currentDate = formatDate(d);
      picker.value = currentDate;
      loadReport();
    };
    document.getElementById("btn-next").onclick = () => {
      const d = new Date(currentDate + "T12:00:00");
      d.setDate(d.getDate() + 1);
      const today = new Date();
      if (d > today) return;
      currentDate = formatDate(d);
      picker.value = currentDate;
      loadReport();
    };
    picker.onchange = () => {
      currentDate = picker.value;
      loadReport();
    };

    // ── Store selector ──
    document.getElementById("store-select").onchange = (e) => {
      currentStore = e.target.value;
      loadReport();
    };

    // ── Data fetch ──
    async function loadReport() {
      const auth = HotpotApp.getAuth();
      if (!auth) { setTimeout(loadReport, 1000); return; }

      try {
        const headers = { "Content-Type": "application/json" };
        if (auth && auth.token) headers["Authorization"] = `Bearer ${auth.token}`;
        const res = await fetch(apiUrl(), { headers });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        render(data);
        document.getElementById("live-dot").style.display = "inline-block";
        document.getElementById("update-time").textContent =
          `更新于 ${new Date().toLocaleTimeString("zh-CN")}`;
      } catch (e) {
        document.getElementById("update-time").textContent = `加载失败: ${e.message}`;
        document.getElementById("live-dot").style.display = "none";
      }
    }

    // ── Render ──
    function render(data) {
      const hero = data.hero || {};
      const trend = data.trend_30d || {};
      const alerts = data.alerts || [];

      // Hero cards
      document.getElementById("hero-total").textContent = hero.total_waste_count ?? "--";
      document.getElementById("hero-events").textContent = hero.event_count ?? "--";
      document.getElementById("hero-avg7").textContent = hero.seven_day_avg != null ? hero.seven_day_avg : "--";
      document.getElementById("hero-avg30").textContent = hero.thirty_day_avg != null ? hero.thirty_day_avg : "--";

      // Day-over-day
      const dod = hero.day_over_day;
      if (dod) {
        document.getElementById("hero-dod-val").textContent = dod.today != null ? dod.today : "--";
        const pctEl = document.getElementById("hero-dod-pct");
        if (dod.change_pct != null) {
          const arrow = dod.change_pct > 0 ? "▲" : dod.change_pct < 0 ? "▼" : "→";
          pctEl.textContent = `${arrow} ${Math.abs(dod.change_pct)}%`;
          pctEl.className = `change ${dod.direction}`;
        } else {
          pctEl.textContent = "无对比";
          pctEl.className = "change flat";
        }
      }

      // Week-over-week
      const wow = hero.week_over_week || data.trend_30d?.comparison?.week_over_week;
      if (wow) {
        document.getElementById("hero-wow-val").textContent = wow.current_avg != null ? wow.current_avg : "--";
        const pctEl = document.getElementById("hero-wow-pct");
        if (wow.change_pct != null) {
          const arrow = wow.change_pct > 0 ? "▲" : wow.change_pct < 0 ? "▼" : "→";
          pctEl.textContent = `${arrow} ${Math.abs(wow.change_pct)}%`;
          pctEl.className = `change ${wow.direction}`;
        } else {
          pctEl.textContent = "数据不足";
          pctEl.className = "change flat";
        }
      } else {
        document.getElementById("hero-wow-val").textContent = "--";
        document.getElementById("hero-wow-pct").textContent = "数据不足(需14天)";
        document.getElementById("hero-wow-pct").className = "change flat";
      }

      // Chart
      renderChart(trend);

      // TOP5 SKUs
      renderTop5(hero.top_5_skus || []);

      // Alerts
      renderAlerts(alerts);
    }

    function renderChart(trend) {
      const chart = document.getElementById("chart");
      const dates = trend.dates || [];
      const values = trend.trend || [];
      const cmp = trend.comparison || {};

      if (!dates.length || values.every(v => v === 0)) {
        chart.innerHTML = '<div class="empty-state"><span class="es-ic">📊</span>暂无趋势数据</div>';
        return;
      }

      const W = 700, H = 200;
      const pad = { top: 10, right: 10, bottom: 30, left: 45 };
      const pw = W - pad.left - pad.right;
      const ph = H - pad.top - pad.bottom;

      const maxVal = Math.max(1, ...values);
      const xStep = pw / (dates.length - 1 || 1);

      function x(i) { return pad.left + i * xStep; }
      function y(v) { return pad.top + ph - (v / maxVal) * ph; }

      // Y-axis
      let yTicks = "";
      for (let i = 0; i <= 4; i++) {
        const val = Math.round(maxVal * i / 4);
        const yy = y(val);
        yTicks += `<line x1="${pad.left - 5}" x2="${W - pad.right}" y1="${yy}" y2="${yy}" stroke="rgba(255,255,255,0.06)" />`;
        yTicks += `<text x="${pad.left - 8}" y="${yy + 4}" text-anchor="end" fill="#8b949e" font-size="10">${val}</text>`;
      }

      // X-axis labels
      let xLabels = "";
      const labelStride = Math.max(1, Math.floor(dates.length / 10));
      for (let i = 0; i < dates.length; i += labelStride) {
        xLabels += `<text x="${x(i)}" y="${H - 6}" text-anchor="middle" fill="#8b949e" font-size="9">${dates[i].slice(5)}</text>`;
      }

      // Trend polyline
      let trendPoints = "";
      for (let i = 0; i < dates.length; i++) {
        trendPoints += `${x(i)},${y(values[i])} `;
      }
      let areaPoints = `${x(0)},${y(0)} ${trendPoints}${x(dates.length - 1)},${y(0)}`;

      // Avg lines
      let avg7Line = "", avg30Line = "";
      const avg7 = cmp.seven_day_avg || 0;
      const avg30 = cmp.thirty_day_avg || 0;
      if (avg7 > 0) {
        const ay7 = y(avg7);
        avg7Line = `<line x1="${pad.left}" x2="${W - pad.right}" y1="${ay7}" y2="${ay7}" stroke="var(--warn)" stroke-dasharray="4,4" stroke-width="1.5" />`;
      }
      if (avg30 > 0) {
        const ay30 = y(avg30);
        avg30Line = `<line x1="${pad.left}" x2="${W - pad.right}" y1="${ay30}" y2="${ay30}" stroke="var(--blue)" stroke-dasharray="6,3" stroke-width="1.5" />`;
      }

      chart.innerHTML = `
        <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
          ${yTicks}${xLabels}
          <polygon points="${areaPoints}" fill="url(#grad)" opacity="0.15" />
          ${avg30Line}${avg7Line}
          <polyline points="${trendPoints}" fill="none" stroke="var(--brand)" stroke-width="2.5" stroke-linejoin="round" />
          ${dates.map((_, i) => values[i] > 0 ? `<circle cx="${x(i)}" cy="${y(values[i])}" r="2.5" fill="var(--brand)" />` : "").join("")}
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--brand)" stop-opacity="0.4" />
              <stop offset="100%" stop-color="var(--brand)" stop-opacity="0" />
            </linearGradient>
          </defs>
        </svg>`;
    }

    function renderTop5(skus) {
      const container = document.getElementById("sku-list");
      if (!skus.length) {
        container.innerHTML = '<div class="empty-state"><span class="es-ic">📦</span>今日暂无废料数据</div>';
        return;
      }
      const maxCount = skus[0].count || 1;
      container.innerHTML = skus.map(sku => {
        const pct = Math.max(2, Math.round((sku.count / maxCount) * 100));
        return `<div class="sku-row">
          <span class="sku-name">${sku.sku}</span>
          <div class="sku-bar-bg"><div class="sku-bar-fill" style="width:${pct}%"></div></div>
          <span class="sku-count">${sku.count}</span>
          <span class="sku-pct">${sku.pct}%</span>
        </div>`;
      }).join("");
    }

    function renderAlerts(alerts) {
      const container = document.getElementById("alert-list");
      const unacked = alerts.filter(a => !a.acknowledged);

      // Alert summary bar
      const summary = document.getElementById("alert-summary");
      if (unacked.length > 0) {
        summary.style.display = "flex";
        const latest = unacked[0];
        document.getElementById("alert-summary-msg").textContent = latest.message;
        document.getElementById("alert-summary-time").textContent = latest.date || latest.created_at?.slice(0, 10) || "";
      } else {
        summary.style.display = "none";
      }

      // Alert list
      if (!alerts.length) {
        container.innerHTML = '<div class="empty-state"><span class="es-ic">✅</span>暂无告警</div>';
        return;
      }
      container.innerHTML = alerts.slice(0, 20).map(a => {
        const ackClass = a.acknowledged ? "ack" : "unack";
        const ackLabel = a.acknowledged ? "已确认" : "⚠ 未确认";
        return `<div class="alert-list-item">
          <span class="al-date">${a.date || a.created_at?.slice(0, 10) || ""}</span>
          <span class="al-msg">${a.message}</span>
          <span class="al-badge ${ackClass}">${ackLabel}</span>
        </div>`;
      }).join("");
    }

    // ── Start ──
    loadReport();
    setInterval(loadReport, REFRESH_MS);
  </script>
</body>
</html>
