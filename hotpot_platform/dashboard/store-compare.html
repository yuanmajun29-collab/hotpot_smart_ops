<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多店对比 · 冯校长火锅 · 智能运营</title>
  <link rel="stylesheet" href="assets/theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .compare-top { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .compare-top select, .compare-top input { background: var(--card2); border: 1px solid var(--border); color: var(--fg); padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; }
    .summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .summary-card span { display: block; color: var(--muted); font-size: 0.74rem; }
    .summary-card b { display: block; font-size: 1.4rem; margin-top: 4px; }
    .compare-table-wrap { overflow-x: auto; margin-bottom: 16px; }
    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .compare-table th { text-align: left; padding: 10px 12px; background: var(--card2); border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 500; white-space: nowrap; }
    .compare-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .compare-table tr:hover td { background: var(--card2); }
    .compare-table tr.expanded td { background: rgba(230,169,62,0.08); }
    .trend-up { color: #4ade80; }
    .trend-down { color: #f87171; }
    .trend-flat { color: var(--muted); }
    .detail-panel { display: none; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 4px; }
    .detail-panel.show { display: block; }
    .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .detail-card { border: 1px solid var(--border); border-radius: 6px; padding: 10px; background: var(--card); }
    .detail-card label { display: block; color: var(--muted); font-size: 0.72rem; }
    .detail-card b { display: block; font-size: 1.1rem; margin-top: 3px; }
    .leaderboard-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .leaderboard { border: 1px solid var(--border); border-radius: 8px; padding: 12px; background: var(--card); }
    .leaderboard h4 { margin: 0 0 10px; font-size: 0.88rem; color: var(--muted); }
    .lb-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.83rem; }
    .lb-item:last-child { border-bottom: none; }
    .lb-rank { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-size: 0.72rem; font-weight: 600; }
    .lb-gold { background: #e6a93e; color: #000; }
    .lb-silver { background: #c0c0c0; color: #000; }
    .lb-bronze { background: #cd7f32; color: #000; }
    .lb-red { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
    .radar-wrap { position: relative; height: 320px; max-width: 420px; margin: 0 auto; }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    @media(max-width:768px) {
      .summary-row { grid-template-columns: repeat(2, 1fr); }
      .leaderboard-wrap { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<nav class="topbar"><a href="index.html">← 总览</a> <span>多店对比</span></nav>
<main class="content">

<div class="compare-top">
  <select id="zone-select"><option value="">全部大区</option></select>
  <select id="region-select"><option value="">全部区域</option></select>
  <input type="date" id="date-start" title="起始日期" />
  <input type="date" id="date-end" title="结束日期" />
  <button onclick="refresh()" style="background:var(--accent);color:#000;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem">刷新</button>
</div>

<div class="summary-row" id="summary-cards"></div>

<div class="leaderboard-wrap" id="leaderboard-area"></div>

<div class="compare-table-wrap">
  <table class="compare-table">
    <thead>
      <tr>
        <th>门店</th><th>损耗率</th><th>翻台率</th><th>SOP 合规</th><th>食安告警</th><th>服务态度</th><th>趋势</th><th>综合评分</th>
      </tr>
    </thead>
    <tbody id="store-rows"></tbody>
  </table>
  <div id="detail-container"></div>
</div>

<div class="radar-wrap"><canvas id="radar-chart"></canvas></div>

<div class="loading" id="loading-state">加载中...</div>

</main>

<script src="config.js"></script>
<script>
const HUB = (window.HOTPOT_CONFIG && window.HOTPOT_CONFIG.hubUrl) || "http://127.0.0.1:8098";
let selectedStores = new Set();
let radarChart = null;

async function api(url) {
  const res = await fetch(HUB + url);
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

async function refresh() {
  const zone = document.getElementById("zone-select").value;
  const region = document.getElementById("region-select").value;
  document.getElementById("loading-state").style.display = "block";
  try {
    const params = new URLSearchParams();
    if (zone) params.set("zone_id", zone);
    if (region) params.set("region_id", region);
    const data = await api("/api/analytics/compare?" + params.toString());
    render(data);
  } catch (e) {
    console.error(e);
    document.getElementById("loading-state").innerText = "加载失败，请检查 Hub 连接";
  }
}

function render(data) {
  document.getElementById("loading-state").style.display = "none";
  if (!data || !data.stores || !data.stores.length) {
    document.getElementById("loading-state").innerText = "暂无数据";
    return;
  }

  const stores = data.stores;
  renderSummary(stores);
  renderTable(stores);
  renderLeaderboard(stores);
  renderRadar(stores);
}

function renderSummary(stores) {
  const n = stores.length;
  const avgWaste = (stores.reduce((s,x) => s + (x.waste_rate||0), 0) / n).toFixed(1);
  const avgTurn = (stores.reduce((s,x) => s + (x.table_turnover||0), 0) / n).toFixed(2);
  const avgSop = Math.round(stores.reduce((s,x) => s + (x.sop_score||0), 0) / n);
  const totalAlerts = stores.reduce((s,x) => s + (x.food_safety_alerts||0), 0);

  document.getElementById("summary-cards").innerHTML = `
    <div class="summary-card"><span>门店数</span><b>${n}</b></div>
    <div class="summary-card"><span>平均损耗率</span><b>${avgWaste}%</b></div>
    <div class="summary-card"><span>平均翻台率</span><b>${avgTurn}</b></div>
    <div class="summary-card"><span>平均 SOP 评分</span><b>${avgSop}</b></div>`;
}

function renderTable(stores) {
  const rows = stores.map(s => {
    const composite = calcComposite(s);
    const trendIcon = s.trend === "improving" ? '<span class="trend-up">↑ 改善</span>'
      : s.trend === "worsening" ? '<span class="trend-down">↓ 恶化</span>'
      : '<span class="trend-flat">→ 平稳</span>';
    const alertClass = (s.food_safety_alerts||0) > 0 ? 'style="color:#f87171;font-weight:600"' : '';
    return `<tr onclick="toggleStore('${s.store_id}')" id="row-${s.store_id}">
      <td><input type="checkbox" onclick="event.stopPropagation();toggleSelect('${s.store_id}')" ${selectedStores.has(s.store_id)?'checked':''} /> ${s.store_name||s.store_id}</td>
      <td>${(s.waste_rate||0).toFixed(1)}%</td>
      <td>${(s.table_turnover||0).toFixed(2)}</td>
      <td>${s.sop_score||0}</td>
      <td ${alertClass}>${s.food_safety_alerts||0}</td>
      <td>${s.staff_attitude_score||0}</td>
      <td>${trendIcon}</td>
      <td><b>${composite}</b></td>
    </tr>
    <tr id="detail-${s.store_id}" style="display:none"><td colspan="8"><div class="detail-panel">
      <div class="detail-grid">
        <div class="detail-card"><label>损耗率</label><b>${(s.waste_rate||0).toFixed(1)}%</b></div>
        <div class="detail-card"><label>翻台率</label><b>${(s.table_turnover||0).toFixed(2)}</b></div>
        <div class="detail-card"><label>SOP 评分</label><b>${s.sop_score||0}</b></div>
        <div class="detail-card"><label>食安告警</label><b>${s.food_safety_alerts||0}</b></div>
        <div class="detail-card"><label>服务态度</label><b>${s.staff_attitude_score||0}</b></div>
        <div class="detail-card"><label>设备健康</label><b>${s.device_health||"N/A"}</b></div>
        <div class="detail-card"><label>翻台趋势</label><b>${s.table_turnover_trend||"平稳"}</b></div>
        <div class="detail-card"><label>综合评分</label><b>${calcComposite(s)}</b></div>
      </div>
    </div></td></tr>`;
  }).join("");

  document.getElementById("store-rows").innerHTML = rows;
}

function calcComposite(s) {
  const score = (
    (s.sop_score||0) * 0.25 +
    Math.max(0, 100 - (s.waste_rate||0)*2) * 0.25 +
    (s.table_turnover||0) * 2 * 0.20 +
    Math.max(0, 100 - (s.food_safety_alerts||0)*10) * 0.15 +
    (s.staff_attitude_score||0) * 0.15
  );
  return Math.round(score);
}

function toggleStore(id) {
  const detail = document.getElementById("detail-" + id);
  const row = document.getElementById("row-" + id);
  if (detail.style.display === "none" || !detail.style.display) {
    detail.style.display = "";
    row.classList.add("expanded");
  } else {
    detail.style.display = "none";
    row.classList.remove("expanded");
  }
}

function toggleSelect(id) {
  if (selectedStores.has(id)) selectedStores.delete(id);
  else selectedStores.add(id);
  renderRadar(window._stores);
}

function renderLeaderboard(stores) {
  const sorted = [...stores].sort((a,b) => calcComposite(b) - calcComposite(a));
  const top3 = sorted.slice(0, 3);
  const bottom3 = sorted.slice(-3).reverse();
  const ranks = ["lb-gold","lb-silver","lb-bronze"];

  document.getElementById("leaderboard-area").innerHTML = `
    <div class="leaderboard">
      <h4>🏆 卓越门店</h4>
      ${top3.map((s,i) => `<div class="lb-item"><span class="lb-rank ${ranks[i]}">${i+1}</span> ${s.store_name||s.store_id} <b>${calcComposite(s)}</b></div>`).join("")}
    </div>
    <div class="leaderboard">
      <h4>⚠️ 待改善门店</h4>
      ${bottom3.map((s,i) => `<div class="lb-item"><span class="lb-rank lb-red">${sorted.length - 2 + i}</span> ${s.store_name||s.store_id} <b>${calcComposite(s)}</b></div>`).join("")}
    </div>`;
}

function renderRadar(stores) {
  window._stores = stores;
  const selected = stores.filter(s => selectedStores.has(s.store_id));
  if (selected.length < 2) {
    if (selected.length === 0) selectedStores.add(stores[0]?.store_id);
    selected.push(...stores.slice(0,2).filter(s => s.store_id !== stores[0]?.store_id));
    if (selected.length < 2) return;
  }

  const labels = ["损耗控制","翻台效率","SOP合规","食安管理","服务态度"];
  const datasets = selected.map((s, i) => ({
    label: s.store_name || s.store_id,
    data: [
      Math.max(0, 100 - (s.waste_rate||0)*3),
      (s.table_turnover||0) * 30,
      s.sop_score||0,
      Math.max(0, 100 - (s.food_safety_alerts||0)*10),
      s.staff_attitude_score||0,
    ].map(v => Math.min(100, Math.max(0, v))),
    borderColor: ["#e6a93e","#60a5fa","#4ade80","#f87171","#a78bfa"][i],
    backgroundColor: ["rgba(230,169,62,0.1)","rgba(96,165,250,0.1)","rgba(74,222,128,0.1)","rgba(248,113,113,0.1)","rgba(167,139,250,0.1)"][i],
    borderWidth: 2,
  }));

  if (radarChart) radarChart.destroy();
  const ctx = document.getElementById("radar-chart").getContext("2d");
  radarChart = new Chart(ctx, {
    type: "radar",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: "bottom" } },
      scales: { r: { beginAtZero: true, max: 100, ticks: { display: false } } }
    }
  });
}

// Init
(async () => {
  try {
    const orgs = await api("/api/v1/org");
    const zones = orgs.zones || [];
    const zoneS = document.getElementById("zone-select");
    zones.forEach(z => { const o = document.createElement("option"); o.value = z.zone_id; o.text = z.zone_name; zoneS.appendChild(o); });
    zoneS.onchange = refresh;
    document.getElementById("region-select").onchange = refresh;
    refresh();
  } catch (e) { console.error(e); document.getElementById("loading-state").innerText = "Hub 未连接"; }
  // default date range: last 7 days
  const now = new Date();
  document.getElementById("date-end").valueAsDate = now;
  document.getElementById("date-start").valueAsDate = new Date(now - 7*864e5);
})();
</script>
</body>
</html>
