<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f1419" />
  <title>冯校长火锅 · 智能运营 · 手机版</title>
  <link rel="stylesheet" href="../assets/theme.css" />
</head>
<body>
  <div class="mobile-app">
    <header class="mobile-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="brand-seal" style="width:30px;height:30px;border-radius:9px;font-size:17px;">馮</div>
        <h1 id="store-name" style="font-family:'STSong','Songti SC','Noto Serif SC',serif;">—</h1>
      </div>
      <div class="mobile-header-meta">
        <span id="user-chip">—</span>
        <span>·</span>
        <span id="conn-status"><span class="status-dot offline"></span>连接中</span>
        <span>·</span>
        <span>午市</span>
      </div>
    </header>

    <main class="mobile-main">
      <!-- Tab: 首页 -->
      <section class="mobile-tab-panel active" id="panel-home">
        <div class="mobile-kpi-grid">
          <div class="card"><h3>严重告警</h3><div class="stat critical" id="m-critical">-</div></div>
          <div class="card"><h3>待清台</h3><div class="stat warn" id="m-clean">-</div></div>
          <div class="card"><h3>SOP 合规</h3><div class="stat ok" id="m-sop">-</div></div>
          <div class="card"><h3>来料偏差</h3><div class="stat warn" id="m-cost">-</div></div>
        </div>
        <div class="card">
          <h3>待处理</h3>
          <div id="m-todo"></div>
        </div>
        <div class="card" style="margin-top:12px">
          <h3>今日摘要</h3>
          <p id="m-summary" style="font-size:0.85rem;color:var(--muted);line-height:1.7">加载中...</p>
        </div>
        <div class="card" style="margin-top:12px">
          <h3>快捷操作</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
            <a class="btn" href="../pda/receiving.html" style="text-align:center">📦 收货确认</a>
            <button class="btn btn-ghost" type="button" data-goto-tab="tables" style="text-align:center">🍲 桌态管理</button>
          </div>
        </div>
      </section>

      <!-- Tab: 桌态 -->
      <section class="mobile-tab-panel" id="panel-tables">
        <p style="font-size:0.8rem;color:var(--muted);margin-bottom:12px">点击桌位查看 · 5s 自动刷新</p>
        <div class="tables mobile-tables" id="m-table-grid"></div>
        <div class="card" style="margin-top:16px">
          <h3>翻台优先</h3>
          <ul class="list-plain" id="m-suggestions"></ul>
        </div>
      </section>

      <!-- Tab: 告警 -->
      <section class="mobile-tab-panel" id="panel-alerts">
        <div class="mobile-filter filter-bar">
          <button class="btn btn-sm active" data-filter="all">全部</button>
          <button class="btn btn-sm btn-ghost" data-filter="critical">严重</button>
          <button class="btn btn-sm btn-ghost" data-filter="warn">警告</button>
        </div>
        <div class="events" id="m-events"></div>
      </section>

      <!-- Tab: 我的 -->
      <section class="mobile-tab-panel" id="panel-profile">
        <div class="card" style="margin-bottom:16px">
          <h3>账号信息</h3>
          <p style="font-size:0.9rem;line-height:1.8;margin-top:8px">
            <span id="p-name">—</span><br>
            <span style="color:var(--muted)" id="p-role">—</span>
          </p>
        </div>
        <div class="card" style="margin-bottom:16px">
          <h3>Hub 地址</h3>
          <input class="hub-input-mobile" id="hub-url" type="text" />
        </div>
        <ul class="mobile-menu-list card" style="padding:0 12px">
          <li><a href="../report.html">运营日报 <span>›</span></a></li>
          <li><a href="../sop.html">SOP 执行 <span>›</span></a></li>
          <li><a href="../cost.html">来料成本 <span>›</span></a></li>
          <li><a href="../kitchen.html">后厨 IoT <span>›</span></a></li>
          <li><a href="../pda/receiving.html">收货 PDA <span>›</span></a></li>
          <li><a href="../home.html">桌面版看板 <span>›</span></a></li>
        </ul>
        <button class="btn btn-block btn-ghost" style="margin-top:20px" id="btn-logout">退出登录</button>
      </section>
    </main>

    <nav class="mobile-tabbar">
      <button class="mobile-tab active" data-tab="home" type="button">
        <svg class="tab-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg><span>首页</span>
      </button>
      <button class="mobile-tab" data-tab="tables" type="button">
        <svg class="tab-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M14 14h7v7h-7z"/><path d="M3 14h7v7H3z"/></svg><span>桌态</span>
      </button>
      <button class="mobile-tab" data-tab="alerts" type="button">
        <svg class="tab-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 6 3 8 3 8H3s3-2 3-8"/><path d="M10.5 21a1.8 1.8 0 0 0 3 0"/></svg><span>告警</span>
        <span class="badge" id="tab-badge" style="display:none">0</span>
      </button>
      <button class="mobile-tab" data-tab="profile" type="button">
        <svg class="tab-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/></svg><span>我的</span>
      </button>
    </nav>
  </div>

  <script src="../assets/core.js"></script>
  <script>
    const auth = HotpotApp.requireAuth();
    if (!auth) throw new Error("auth required");

    document.getElementById("store-name").textContent = auth.storeName || "试点店";
    document.getElementById("user-chip").textContent = auth.name + " · " + auth.role;
    document.getElementById("p-name").textContent = auth.name;
    document.getElementById("p-role").textContent = auth.role + " · " + auth.storeName;

    const hubInput = document.getElementById("hub-url");
    hubInput.value = HotpotApp.hubUrl();
    hubInput.onchange = () => HotpotApp.setHubUrl(hubInput.value);

    document.getElementById("btn-logout").onclick = HotpotApp.logout;

    let allEvents = [];
    let alertFilter = "all";

    function activateTab(name) {
      document.querySelectorAll(".mobile-tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === name));
      document.querySelectorAll(".mobile-tab-panel").forEach((p) => p.classList.remove("active"));
      document.getElementById("panel-" + name).classList.add("active");
    }
    document.querySelectorAll(".mobile-tab").forEach((tab) => {
      tab.onclick = () => activateTab(tab.dataset.tab);
    });
    document.querySelectorAll("[data-goto-tab]").forEach((el) => {
      el.onclick = () => activateTab(el.dataset.gotoTab);
    });

    document.querySelectorAll("#panel-alerts .filter-bar button").forEach((btn) => {
      btn.onclick = () => {
        document.querySelectorAll("#panel-alerts .filter-bar button").forEach((b) => {
          b.classList.remove("active");
          b.classList.add("btn-ghost");
        });
        btn.classList.add("active");
        btn.classList.remove("btn-ghost");
        alertFilter = btn.dataset.filter;
        renderAlerts();
      };
    });

    function renderAlerts() {
      HotpotApp.renderEvents(document.getElementById("m-events"), allEvents, {
        filter: alertFilter,
        showAck: true,
        onAck: () => { renderAlerts(); updateBadge(); },
      });
    }

    function updateBadge() {
      const n = HotpotApp.countUnackedCritical(allEvents);
      const badge = document.getElementById("tab-badge");
      if (n > 0) { badge.style.display = "flex"; badge.textContent = n > 9 ? "9+" : n; }
      else badge.style.display = "none";
    }

    async function refresh() {
      try {
        const [data, events] = await Promise.all([
          HotpotApp.fetchSummary(),
          HotpotApp.fetchEvents(25),
        ]);
        allEvents = events;
        document.getElementById("conn-status").innerHTML =
          '<span class="status-dot online"></span>已连接';

        const t = data.table_state_counts || {};
        const ev = data.by_level || {};
        document.getElementById("m-critical").textContent = ev.critical ?? 0;
        document.getElementById("m-clean").textContent = t.need_clean ?? 0;
        document.getElementById("m-sop").textContent =
          data.sop_stats?.compliance_rate != null ? data.sop_stats.compliance_rate + "%" : "-";
        document.getElementById("m-cost").textContent =
          data.cost_stats?.variance_rate_pct != null ? data.cost_stats.variance_rate_pct + "%" : "-";

        document.getElementById("m-summary").textContent =
          `空桌 ${t.empty || 0} · 用餐 ${t.dining || 0} · 待清 ${t.need_clean || 0} · 警告 ${ev.warn || 0} 条`;

        const todo = document.getElementById("m-todo");
        todo.innerHTML = "";
        const items = [];
        (data.turnover_suggestions || []).slice(0, 2).forEach((s) => {
          items.push(`${s.table_id} 待清 → ${s.action}`);
        });
        if ((ev.critical || 0) > 0) items.push(`${ev.critical} 条严重告警`);
        if (!items.length) items.push("运营正常，无紧急待办");
        items.forEach((text) => {
          const div = document.createElement("div");
          div.className = "todo-item";
          div.style.padding = "10px 0";
          div.innerHTML = `<span style="font-size:0.9rem">${text}</span>`;
          todo.appendChild(div);
        });

        HotpotApp.renderTableGrid(document.getElementById("m-table-grid"), data.table_states || {}, (table) => {
          alert(table.table_id + " · " + (HotpotApp.STATE_LABELS[table.state] || table.state) + "\n（演示：完整详情见桌面版）");
        });

        const sug = document.getElementById("m-suggestions");
        sug.innerHTML = "";
        (data.turnover_suggestions || []).forEach((s, i) => {
          const li = document.createElement("li");
          li.textContent = `#${i + 1} ${s.table_id} → ${s.action}`;
          sug.appendChild(li);
        });
        if (!sug.children.length) sug.innerHTML = "<li>暂无</li>";

        renderAlerts();
        updateBadge();
      } catch (e) {
        document.getElementById("conn-status").innerHTML =
          '<span class="status-dot offline"></span>未连接 Hub';
      }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
