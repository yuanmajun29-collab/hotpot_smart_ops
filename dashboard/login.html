<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 冯校长火锅 · 智能运营</title>
  <link rel="stylesheet" href="assets/theme.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div style="display:flex;align-items:center;gap:13px;margin-bottom:8px;">
        <div class="brand-seal" style="width:46px;height:46px;border-radius:13px;font-size:27px;">馮</div>
        <h1 style="font-family:'STSong','Songti SC','Noto Serif SC',serif;letter-spacing:.04em;margin:0;">冯校长火锅</h1>
      </div>
      <p class="subtitle">智能运营 · Phase 1 MVP（玉环 / 椒江）</p>
      <form id="login-form">
        <div class="form-group">
          <label>演示身份（账号与角色绑定）</label>
          <select id="role">
            <option value="店长">店长 · zhangdian</option>
            <option value="前厅领班">前厅领班 · lingban</option>
            <option value="厨师长">厨师长 · chushi</option>
            <option value="收货员">收货员 · shouhuo</option>
            <option value="区域督导">区域督导 · quyududao</option>
            <option value="总部PMO">总部 PMO · zongbu</option>
            <option value="集团决策者">集团决策者（老板）· laoban</option>
          </select>
          <p id="account-hint" style="margin:6px 0 0;font-size:0.78rem;color:var(--muted);">
            登录账号：<code id="account-name">zhangdian</code> · 角色由服务端按账号判定
          </p>
          <input type="hidden" id="username" value="zhangdian" />
          <input type="hidden" id="password" value="demo" />
        </div>
        <div class="form-group" id="store-group">
          <label>门店</label>
          <select id="store">
            <option value="冯校长火锅·玉环店" data-store-id="store_yuhuan">冯校长火锅·玉环店</option>
            <option value="冯校长火锅·椒江店" data-store-id="store_jiaojiang">冯校长火锅·椒江店</option>
          </select>
        </div>
        <button type="submit" class="btn btn-block" id="btn-desktop">进入桌面看板</button>
        <button type="button" class="btn btn-block btn-ghost" id="btn-mobile" style="margin-top:10px">进入手机版 H5</button>
      </form>
      <p style="margin-top:16px;font-size:0.8rem;color:var(--muted);text-align:center;">
        演示账号密码 demo · 角色由服务端判定 · <a href="poc.html">旧版 PoC</a> · <a href="login.html?mobile=1">手机登录</a>
      </p>
    </div>
  </div>
  <script src="assets/core.js"></script>
  <script>
    function isMobileUA() {
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth <= 520;
    }
    function targetAfterLogin(mobile, role) {
      if (role === "集团决策者") return mobile ? "mobile/index.html" : "cockpit.html";
      if (role === "总部PMO" || role === "总部 IT") {
        return mobile ? "mobile/index.html" : HotpotApp.adminPageUrl("admin/index.html");
      }
      if (role === "区域督导") return mobile ? "mobile/index.html" : "regional.html";
      if (role === "收货员") return "pda/receiving.html";
      return mobile ? "mobile/index.html" : "home.html";
    }
    function isNoStoreRole(role) {
      return role === "总部PMO" || role === "总部 IT" || role === "集团决策者";
    }
    function isHQRole(role) {
      return role === "总部PMO" || role === "总部 IT";
    }

    // Demo persona -> account. Picking a persona selects an account; the backend
    // is the sole authority on what role that account actually has.
    const ROLE_ACCOUNT = {
      "店长": "zhangdian",
      "前厅领班": "lingban",
      "厨师长": "chushi",
      "收货员": "shouhuo",
      "区域督导": "quyududao",
      "总部PMO": "zongbu",
      "集团决策者": "laoban",
    };

    function updateRoleUI() {
      const role = document.getElementById("role").value;
      const noStore = isNoStoreRole(role);
      document.getElementById("store-group").style.display = noStore ? "none" : "";
      const btn = document.getElementById("btn-desktop");
      if (role === "集团决策者") btn.textContent = "进入集团驾驶仓";
      else if (isHQRole(role)) btn.textContent = "进入运营后台";
      else btn.textContent = "进入桌面看板";
      // Persona is an account: bind the demo username so the client never picks a
      // role independent of its account. The server remains the role authority.
      const account = ROLE_ACCOUNT[role] || "zhangdian";
      document.getElementById("username").value = account;
      document.getElementById("account-name").textContent = account;
    }

    const params = new URLSearchParams(location.search);
    const preferMobile = params.get("mobile") === "1";

    if (params.get("admin") === "1") {
      document.getElementById("username").value = "zongbu";
      document.getElementById("role").value = "总部PMO";
      HotpotApp.syncDeploymentOrigins({ admin: true });
    } else if (params.get("cockpit") === "1") {
      document.getElementById("username").value = "laoban";
      document.getElementById("role").value = "集团决策者";
    } else if (location.port !== "3001") {
      HotpotApp.syncDeploymentOrigins({ combined: true });
    }
    document.getElementById("role").onchange = updateRoleUI;
    updateRoleUI();

    HotpotApp.clearAuth();

    function doLogin(mobile) {
      const storeEl = document.getElementById("store");
      const username = document.getElementById("username").value || "zhangdian";
      const password = document.getElementById("password").value || "demo";
      const selectedStoreName = storeEl.value;
      const selectedStoreId = storeEl.selectedOptions[0]?.dataset.storeId || "store_yuhuan";

      // Do NOT send a client-chosen role: the backend derives the role from the
      // account, so the role shown after login always reflects real authority.
      HotpotApp.hubLogin(username, password, selectedStoreId)
        .then((tok) => {
          const user = tok.user || {};
          const role = user.role; // server is authoritative
          const isExec = role === "集团决策者";
          const isHQ = isHQRole(role);
          const isRegional = role === "区域督导";
          const noStore = isNoStoreRole(role);
          HotpotApp.setAuth({
            name: user.name || username,
            role,
            storeName: isExec ? "集团总部" : isHQ ? "全国总部" : isRegional ? "台州区域" : selectedStoreName,
            storeId: noStore || isRegional ? "*" : (user.store_id && user.store_id !== "*" ? user.store_id : selectedStoreId),
            token: tok.access_token,
          });
          window.location.href = targetAfterLogin(mobile, role);
        })
        .catch(() => {
          alert("登录失败：请确认账号与密码");
        });
    }

    document.getElementById("login-form").onsubmit = (e) => {
      e.preventDefault();
      doLogin(false);
    };
    document.getElementById("btn-mobile").onclick = () => doLogin(true);

    if (preferMobile || isMobileUA()) {
      document.getElementById("btn-mobile").textContent = "进入手机版 H5（推荐）";
      const desk = document.getElementById("btn-desktop");
      const mob = document.getElementById("btn-mobile");
      desk.className = "btn btn-block btn-ghost";
      mob.className = "btn btn-block";
      mob.style.marginTop = "10px";
    }
  </script>
</body>
</html>
