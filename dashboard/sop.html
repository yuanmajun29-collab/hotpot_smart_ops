<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOP · 冯校长火锅 · 智能运营</title>
  <link rel="stylesheet" href="assets/theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>冯校长火锅</h1><p>智能运营 · MVP</p></div>
      <a class="nav-item" href="home.html">首页概览</a>
      <a class="nav-item" href="tables.html">前厅 · 桌态</a>
      <a class="nav-item" href="kitchen.html">后厨 · IoT</a>
      <a class="nav-item active" data-nav="sop" href="sop.html">SOP 执行</a>
      <a class="nav-item" href="cost.html">来料 · 成本</a>
      <a class="nav-item" href="alerts.html">告警中心</a>
      <a class="nav-item" href="report.html">运营日报</a>
      <a class="nav-item" href="pda/receiving.html">收货 PDA</a>
    </aside>
    <div class="main-wrap">
      <header class="topbar">
        <div class="topbar-left"><h2 id="store-name">—</h2><div class="topbar-meta">午市班次</div></div>
        <div class="topbar-right">
          <input class="hub-input" id="hub-url" type="text" />
          <span class="chip" id="user-name">—</span>
          <button class="btn btn-sm btn-ghost" id="btn-logout">退出</button>
        </div>
      </header>
      <main class="content">
        <div class="grid">
          <div class="card"><h3>本班合规率</h3><div class="stat ok" id="sop-rate">-</div></div>
          <div class="card"><h3>通过</h3><div class="stat ok" id="sop-pass">-</div></div>
          <div class="card"><h3>未通过</h3><div class="stat critical" id="sop-fail">-</div></div>
        </div>
        <div class="card" style="margin-bottom:20px">
          <h3>SOP 清单 · 点击展开检查点</h3>
          <div id="sop-list"></div>
        </div>
        <div class="card">
          <h3>违规待整改</h3>
          <div id="violations"></div>
          <div id="assignments" style="margin-top:16px"></div>
        </div>
        <div class="card" style="margin-top:20px">
          <h3>SOP 智能问答</h3>
          <p style="font-size:0.85rem;color:var(--muted);margin-bottom:12px">基于总部 SOP 知识库，输入问题获取执行要点</p>
          <div style="display:flex;gap:8px;margin-bottom:12px">
            <input id="sop-q" type="text" placeholder="例如：来料收货 RFID 怎么扫？" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px" />
            <button class="btn btn-sm" id="sop-ask-btn">提问</button>
          </div>
          <div id="sop-answer" style="font-size:0.9rem;line-height:1.6;white-space:pre-wrap;color:var(--text)"></div>
        </div>
      </main>
    </div>
  </div>
  <script src="assets/core.js"></script>
  <script>
    HotpotApp.initShell("sop");
    async function refresh() {
      try {
        const data = await HotpotApp.fetchSummary();
        const sop = data.sop_stats || {};
        document.getElementById("sop-rate").textContent =
          sop.compliance_rate != null ? sop.compliance_rate + "%" : "-";
        document.getElementById("sop-pass").textContent = sop.passed ?? "-";
        document.getElementById("sop-fail").textContent = sop.failed ?? "-";

        const list = document.getElementById("sop-list");
        list.innerHTML = "";
        (sop.results || []).forEach((r) => {
          const div = document.createElement("div");
          div.style.cssText = "border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden";
          const tag = r.status === "passed" ? "pass" : r.status === "failed" ? "fail" : "pending";
          div.innerHTML = `
            <div style="padding:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" class="sop-head">
              <span>${r.sop_name || r.sop_id}</span>
              <span class="tag ${tag}">${r.status}</span>
            </div>
            <div class="sop-detail" style="display:none;padding:0 12px 12px;font-size:0.85rem;color:var(--muted)">
              ${r.reason || "检查点明细（演示）"} · <a href="#">查看全部检查点</a>
            </div>`;
          div.querySelector(".sop-head").onclick = () => {
            const d = div.querySelector(".sop-detail");
            d.style.display = d.style.display === "none" ? "block" : "none";
          };
          list.appendChild(div);
        });
        if (!list.children.length) list.innerHTML = "<div class='empty-state'><span class='es-ic'>\u2713</span>本班尚无 SOP 检查记录<br><small>运行 PoC 后将在此展示各项检查结果</small></div>";

        const viol = document.getElementById("violations");
        viol.innerHTML = "";
        const failed = (sop.results || []).filter((r) => r.status === "failed");
        if (!failed.length) {
          viol.innerHTML = "<div class='empty-state'><span class='es-ic'>\u2713</span>本班无违规项<br><small>所有 SOP 检查项均达标</small></div>";
        } else {
          failed.forEach((r) => {
            const div = document.createElement("div");
            div.className = "todo-item";
            div.style.cssText = "display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)";
            const btn = document.createElement("button");
            btn.className = "btn btn-sm";
            btn.textContent = "指派整改";
            btn.onclick = async () => {
              if (!HotpotApp.canAction(HotpotApp.getAuth()?.role, "sop_assign")) {
                alert("当前角色无 SOP 指派权限");
                return;
              }
              btn.disabled = true;
              btn.textContent = "提交中…";
              try {
                await HotpotApp.assignSop({
                  sop_id: r.sop_id || r.sop_name,
                  sop_name: r.sop_name || r.sop_id,
                  assignee: "厨师长",
                  note: r.reason || "",
                });
                btn.textContent = "已指派 ✓";
                await renderAssignments();
              } catch (e) {
                alert(e.message || String(e));
                btn.disabled = false;
                btn.textContent = "指派整改";
              }
            };
            const span = document.createElement("span");
            span.textContent = `${r.sop_name}：${r.reason || "未达标"}`;
            div.appendChild(span);
            div.appendChild(btn);
            viol.appendChild(div);
          });
        }
        await renderAssignments();
      } catch (e) { console.warn(e); }
    }

    async function renderAssignments() {
      const box = document.getElementById("assignments");
      try {
        const data = await HotpotApp.fetchSopAssignments("open");
        const items = data.assignments || [];
        if (!items.length) {
          box.innerHTML = "";
          return;
        }
        box.innerHTML = "<h4 style='font-size:0.9rem;margin-bottom:8px'>进行中的整改工单</h4>";
        items.forEach((a) => {
          const div = document.createElement("div");
          div.style.cssText = "font-size:0.85rem;padding:8px 0;border-bottom:1px solid var(--border)";
          div.innerHTML = `<b>${a.sop_name}</b> → ${a.assignee} <span class="tag pending">${a.status}</span>`;
          box.appendChild(div);
        });
      } catch (e) {
        box.innerHTML = "";
      }
    }

    document.getElementById("sop-ask-btn").onclick = async () => {
      const q = document.getElementById("sop-q").value.trim();
      if (!q) return;
      const out = document.getElementById("sop-answer");
      out.textContent = "思考中…";
      try {
        const data = await HotpotApp.askSop(q);
        out.textContent = data.answer || "无回答";
      } catch (e) {
        out.textContent = "问答失败: " + e.message;
      }
    };
    refresh();
    setInterval(refresh, 8000);
  </script>
</body>
</html>
