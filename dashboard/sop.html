<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOP · 冯校长火锅 · 智能运营</title>
  <link rel="stylesheet" href="assets/theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>冯校长火锅</h1><p>智能运营 · MVP</p></div>
      <a class="nav-item" href="home.html">首页概览</a>
      <a class="nav-item" href="tables.html">前厅 · 桌态</a>
      <a class="nav-item" href="kitchen.html">后厨 · IoT</a>
      <a class="nav-item active" data-nav="sop" href="sop.html">SOP 执行</a>
      <a class="nav-item" href="cost.html">来料 · 成本</a>
      <a class="nav-item" href="alerts.html">告警中心</a>
      <a class="nav-item" href="report.html">运营日报</a>
      <a class="nav-item" href="pda/receiving.html">收货 PDA</a>
    </aside>
    <div class="main-wrap">
      <header class="topbar">
        <div class="topbar-left"><h2 id="store-name">—</h2><div class="topbar-meta">午市班次</div></div>
        <div class="topbar-right">
          <input class="hub-input" id="hub-url" type="text" />
          <span class="chip" id="user-name">—</span>
          <button class="btn btn-sm btn-ghost" id="btn-logout">退出</button>
        </div>
      </header>
      <main class="content">
        <div class="grid">
          <div class="card"><h3>本班合规率</h3><div class="stat ok" id="sop-rate">-</div></div>
          <div class="card"><h3>通过</h3><div class="stat ok" id="sop-pass">-</div></div>
          <div class="card"><h3>未通过</h3><div class="stat critical" id="sop-fail">-</div></div>
        </div>
        <div class="card card-mb">
          <h3>SOP 清单 · 点击展开检查点</h3>
          <div id="sop-list"></div>
        </div>
        <div class="card">
          <h3>违规待整改</h3>
          <div id="violations"></div>
          <div id="assignments" class="card-mt"></div>
        </div>
        <div class="card card-mt">
          <h3>SOP 智能问答</h3>
          <p class="section-hint">基于总部 SOP 知识库，输入问题获取执行要点</p>
          <div class="inline-form">
            <input id="sop-q" class="hub-input" type="text" placeholder="例如：来料收货 RFID 怎么扫？" />
            <button class="btn btn-sm" id="sop-ask-btn">提问</button>
          </div>
          <div id="sop-answer" class="answer-box"></div>
        </div>
      </main>
    </div>
  </div>
  <script src="assets/core.js"></script>
  <script>
    HotpotApp.initShell("sop");
    async function refresh() {
      try {
        const data = await HotpotApp.fetchSummary();
        const sop = data.sop_stats || {};
        document.getElementById("sop-rate").textContent =
          sop.compliance_rate != null ? sop.compliance_rate + "%" : "-";
        document.getElementById("sop-pass").textContent = sop.passed ?? "-";
        document.getElementById("sop-fail").textContent = sop.failed ?? "-";

        const list = document.getElementById("sop-list");
        list.innerHTML = "";
        (sop.results || []).forEach((r) => {
          const div = document.createElement("div");
          div.className = "sop-item";
          div.innerHTML = `
            <div class="sop-item-head">
              <span>${HotpotApp.esc(r.sop_name || r.sop_id)}</span>
              ${HotpotApp.sopStatusTag(r.status)}
            </div>
            <div class="sop-item-body">
              ${HotpotApp.esc(r.reason || "检查点明细（演示）")} · <a href="#">查看全部检查点</a>
            </div>`;
          div.querySelector(".sop-item-head").onclick = () => {
            div.querySelector(".sop-item-body").classList.toggle("open");
          };
          list.appendChild(div);
        });
        if (!list.children.length) {
          HotpotApp.renderEmptyState(list, {
            icon: "✓",
            title: "本班尚无 SOP 检查记录",
            subtitle: "运行 PoC 后将在此展示各项检查结果",
          });
        }

        const viol = document.getElementById("violations");
        viol.innerHTML = "";
        const failed = (sop.results || []).filter((r) => r.status === "failed");
        if (!failed.length) {
          HotpotApp.renderEmptyState(viol, { icon: "✓", title: "本班无违规项", subtitle: "所有 SOP 检查项均达标" });
        } else {
          failed.forEach((r) => {
            const div = document.createElement("div");
            div.className = "todo-item";
            const btn = document.createElement("button");
            btn.className = "btn btn-sm";
            btn.textContent = "指派整改";
            btn.onclick = async () => {
              if (!HotpotApp.canAction(HotpotApp.getAuth()?.role, "sop_assign")) {
                alert("当前角色无 SOP 指派权限");
                return;
              }
              btn.disabled = true;
              btn.textContent = "提交中…";
              try {
                await HotpotApp.assignSop({
                  sop_id: r.sop_id || r.sop_name,
                  sop_name: r.sop_name || r.sop_id,
                  assignee: "厨师长",
                  note: r.reason || "",
                });
                btn.textContent = "已指派 ✓";
                await renderAssignments();
              } catch (e) {
                alert(e.message || String(e));
                btn.disabled = false;
                btn.textContent = "指派整改";
              }
            };
            const span = document.createElement("span");
            span.textContent = `${r.sop_name}：${r.reason || "未达标"}`;
            div.appendChild(span);
            div.appendChild(btn);
            viol.appendChild(div);
          });
        }
        await renderAssignments();
      } catch (e) { console.warn(e); }
    }

    async function renderAssignments() {
      const box = document.getElementById("assignments");
      try {
        const data = await HotpotApp.fetchSopAssignments("open");
        const items = data.assignments || [];
        if (!items.length) {
          box.innerHTML = "";
          return;
        }
        box.innerHTML = "<h4 class='section-hint' style='text-transform:none;font-size:0.9rem'>进行中的整改工单</h4>";
        items.forEach((a) => {
          const div = document.createElement("div");
          div.className = "text-muted";
          div.style.cssText = "font-size:0.85rem;padding:8px 0;border-bottom:1px solid var(--border)";
          div.innerHTML = `<b>${HotpotApp.esc(a.sop_name)}</b> → ${HotpotApp.esc(a.assignee)} ${HotpotApp.sopStatusTag(a.status === "open" ? "pending" : a.status)}`;
          box.appendChild(div);
        });
      } catch (e) {
        box.innerHTML = "";
      }
    }

    document.getElementById("sop-ask-btn").onclick = async () => {
      const q = document.getElementById("sop-q").value.trim();
      if (!q) return;
      const out = document.getElementById("sop-answer");
      out.textContent = "思考中…";
      try {
        const data = await HotpotApp.askSop(q);
        out.textContent = data.answer || "无回答";
      } catch (e) {
        out.textContent = "问答失败: " + e.message;
      }
    };
    refresh();
    setInterval(refresh, 8000);
  </script>
</body>
</html>
