<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页 · 冯校长火锅 · 智能运营</title>
  <link rel="stylesheet" href="assets/theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>冯校长火锅</h1><p>智能运营 · MVP</p></div>
      <a class="nav-item active" data-nav="home" href="home.html">首页概览</a>
      <a class="nav-item" data-nav="tables" href="tables.html">前厅 · 桌态</a>
      <a class="nav-item" data-nav="kitchen" href="kitchen.html">后厨 · IoT</a>
      <a class="nav-item" data-nav="sop" href="sop.html">SOP 执行</a>
      <a class="nav-item" data-nav="cost" href="cost.html">来料 · 成本</a>
      <a class="nav-item" data-nav="alerts" href="alerts.html">告警中心 <span class="nav-badge" id="nav-badge" style="display:none">0</span></a>
      <a class="nav-item" data-nav="report" href="report.html">运营日报</a>
      <a class="nav-item" data-nav="pda" href="pda/receiving.html">收货 PDA</a>
      <a class="nav-item" href="mobile/index.html">📱 手机版</a>
      <a class="nav-item" href="poc.html" style="font-size:0.8rem;">↩ 旧版 PoC</a>
    </aside>
    <div class="main-wrap">
      <header class="topbar">
        <div class="topbar-left">
          <h2 id="store-name">—</h2>
          <div class="topbar-meta">午市 · <span id="conn-status">检测中</span></div>
        </div>
        <div class="topbar-right">
          <input class="hub-input" id="hub-url" type="text" title="Event Hub URL" />
          <span class="chip" id="user-name">—</span>
          <button class="btn btn-sm btn-ghost" id="btn-logout">退出</button>
        </div>
      </header>
      <main class="content">
        <div class="mvp-banner">MVP 原型 · 数据来自 Event Hub 实时 API · 适用于试点店长概念测试</div>
        <div class="grid" id="kpi-grid">
          <div class="card"><h3>严重告警</h3><div class="stat critical" id="k-critical">-</div></div>
          <div class="card"><h3>待清台</h3><div class="stat warn" id="k-clean">-</div></div>
          <div class="card"><h3>SOP 合规率</h3><div class="stat ok" id="k-sop">-</div></div>
          <div class="card"><h3>来料偏差</h3><div class="stat warn" id="k-cost">-</div></div>
          <div class="card"><h3>空桌</h3><div class="stat ok" id="k-empty">-</div></div>
        </div>
        <div class="card" style="margin-bottom:20px">
          <h3>待处理</h3>
          <div id="todo-list"></div>
        </div>
        <h3 style="font-size:0.85rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase">快捷入口</h3>
        <div class="quick-grid">
          <a class="quick-link" href="tables.html"><span>🪑</span>桌态翻台</a>
          <a class="quick-link" href="sop.html"><span>📋</span>SOP</a>
          <a class="quick-link" href="cost.html"><span>⚖️</span>来料成本</a>
          <a class="quick-link" href="kitchen.html"><span>🌡️</span>IoT 链路</a>
          <a class="quick-link" href="alerts.html"><span>🔔</span>告警</a>
          <a class="quick-link" href="report.html"><span>📊</span>日报</a>
        </div>
      </main>
    </div>
  </div>
  <script src="assets/core.js"></script>
  <script>
    HotpotApp.initShell("home");
    async function refresh() {
      try {
        const [data, events] = await Promise.all([
          HotpotApp.fetchSummary(),
          HotpotApp.fetchEvents(20),
        ]);
        const t = data.table_state_counts || {};
        const ev = data.by_level || {};
        document.getElementById("k-critical").textContent = ev.critical ?? 0;
        document.getElementById("k-clean").textContent = t.need_clean ?? 0;
        document.getElementById("k-sop").textContent =
          data.sop_stats?.compliance_rate != null ? data.sop_stats.compliance_rate + "%" : "-";
        document.getElementById("k-cost").textContent =
          data.cost_stats?.variance_rate_pct != null ? data.cost_stats.variance_rate_pct + "%" : "-";
        document.getElementById("k-empty").textContent = t.empty ?? 0;

        const todo = document.getElementById("todo-list");
        todo.innerHTML = "";
        const items = [];
        (data.turnover_suggestions || []).slice(0, 3).forEach((s) => {
          items.push({ text: `${s.table_id} 待清台 → ${s.action}`, link: "tables.html", btn: "去处理" });
        });
        if ((ev.critical || 0) > 0) items.push({ text: `${ev.critical} 条严重告警待确认`, link: "alerts.html", btn: "查看" });
        if (!items.length) items.push({ text: "当前无紧急待办，运营正常", link: null });
        items.forEach((it) => {
          const div = document.createElement("div");
          div.className = "todo-item";
          div.innerHTML = `<span>${it.text}</span>` + (it.link ? `<a class="btn btn-sm" href="${it.link}">${it.btn}</a>` : "");
          todo.appendChild(div);
        });

        const badge = document.getElementById("nav-badge");
        const n = HotpotApp.countUnackedCritical(events);
        if (n > 0) { badge.style.display = ""; badge.textContent = n; }
        else badge.style.display = "none";
      } catch (e) { console.warn(e); }
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
