# 本地验证用主配置：nginx -c deploy/nginx/local-test-main.conf -p /tmp/hotpot-nginx
worker_processes 1;
error_log /tmp/hotpot-nginx/error.log warn;
pid /tmp/hotpot-nginx/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /tmp/hotpot-nginx/access.log;

    include /mnt/project/hotpot_smart_ops/deploy/nginx/split-ports.conf;
}
