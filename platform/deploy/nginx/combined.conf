# 冯校长火锅 · 智能运营 — 同域路径（Phase 1 / 试点）
# 业务平台 + /admin/ 运营后台 同一 server_name
#
# 用法：
#   修改 root、server_name、ssl_certificate*
#   sudo cp combined.conf /etc/nginx/conf.d/hotpot-ops.conf && sudo nginx -t && sudo systemctl reload nginx

upstream hotpot_hub {
    server 127.0.0.1:8088;
    keepalive 8;
}

server {
    listen 80;
    server_name ops.example.com;

    # 生产请改绝对路径，如 /opt/hotpot_smart_ops/dashboard
    root /mnt/project/hotpot_smart_ops/dashboard;
    index login.html;

    # 可选：Hub API 同域反代（看板 Hub URL 可设为 https://ops.example.com/api）
    location /api/ {
        proxy_pass http://hotpot_hub/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        # 运营后台：总部 PMO / IT
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri $uri/ /login.html;
    }

    location ~* \.(js|css|json|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

