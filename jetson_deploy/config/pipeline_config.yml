# 推理流水线配置
# 修改后执行 deploy.sh 生效

# === 摄像头 ===
stream_url: "rtsp://admin:password@192.168.1.64:554/Streaming/Channels/101"
interval_seconds: 10            # 抽帧间隔
stream_timeout: 10               # 流连接超时

# === 推理 ===
auto_infer: true                 # 抽帧后自动触发推理
infer_on_frame_count: 1          # 每 N 帧触发一次推理
skip_vlm: false                  # 跳过 VLM 阶段（调试用）

# === Hub ===
hub_url: "http://192.168.2.85:8098"
store_id: "store_yuhuan"
zone: "备餐废弃区"

# === CLIP-Adapter ===
clip_classes: "clean_kitchen,dirty_surface,food_waste,cluttered,dangerous_object"
clip_threshold: 0.5              # 低于此值触发 VLM

# === 降级 ===
yolo_timeout: 60                 # YOLO 超时(秒)
clip_timeout: 120                # CLIP 超时(秒)
vlm_timeout: 45                  # VLM 超时(秒)
