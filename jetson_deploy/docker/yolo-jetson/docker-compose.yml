# 在 Jetson 上于本目录执行: docker compose build && docker compose run --rm yolo-infer
services:
  yolo-infer:
    build:
      context: .
      dockerfile: Dockerfile
    image: yolo-jetson-infer:local
    # Jetson 上使用 NVIDIA 运行时访问 GPU
    runtime: nvidia
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    volumes:
      # 权重与导出引擎（TensorRT 等）放宿主机，便于替换版本做验证
      - ./models:/models:ro
      - ./data:/data:ro
      - ./runs:/workspace/runs
    working_dir: /workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # 默认交互 shell；一次性推理可改为:
    # command: ["bash", "-lc", "yolo predict model=/models/best.pt source=/data/images device=0 project=/workspace/runs name=demo"]
    command: ["bash", "-lc", "sleep infinity"]
